<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">

    <title>Master Glossary — Andre's Calibrations</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { background:#000; color:#e0e0e0; font-family:-apple-system,'SF Pro Display','Inter','Helvetica Neue',sans-serif; margin:0; padding:10px; min-height:100vh; }
        .glossary-container { max-width:700px; margin:0 auto; padding-bottom:80px; }
        .glossary-header { text-align:center; padding:24px 0; border-bottom:0.5px solid rgba(191,90,242,0.3); margin-bottom:30px; }
        .glossary-header h1 { color:#bf5af2; font-size:1.6rem; font-weight:800; letter-spacing:1px; margin:0; }
        .glossary-header p { color:#636366; font-size:0.82rem; margin-top:8px; }
        .back-link { color:#bf5af2; text-decoration:none; font-weight:600; font-size:0.82rem; display:inline-block; margin-bottom:10px; }
        .phase-card { background:#1c1c1e; border:0.5px solid #38383a; border-radius:16px; padding:22px; margin-bottom:18px; animation:fadeIn 0.4s ease; }
        .phase-label { font-size:0.65rem; color:#bf5af2; text-transform:uppercase; letter-spacing:2px; font-weight:700; margin-bottom:12px; }
        .q-title { font-size:1.02rem; font-weight:700; color:#fff; margin-bottom:14px; line-height:1.4; }
        .q-subtitle { font-size:0.8rem; color:#636366; margin-bottom:14px; line-height:1.4; }
        .opt-btn { display:block; width:100%; text-align:left; padding:14px 16px; margin-bottom:8px; background:#1c1c1e; border:0.5px solid #38383a; border-radius:12px; color:#e0e0e0; cursor:pointer; font-size:0.9rem; transition:all 0.25s cubic-bezier(0.28,0.11,0.32,1); line-height:1.3; font-family:inherit; }
        .opt-btn:hover { border-color:#bf5af2; background:rgba(191,90,242,0.06); transform:translateY(-1px); }
        .opt-btn:active { transform:scale(0.98); }
        .opt-btn.selected { border-color:#bf5af2; background:rgba(191,90,242,0.12); color:#fff; }
        .opt-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
        .opt-grid .opt-btn { text-align:center; }
        .multi-btn { display:inline-block; padding:10px 16px; margin:4px; background:#1c1c1e; border:0.5px solid #38383a; border-radius:10px; color:#98989d; cursor:pointer; font-size:0.85rem; transition:all 0.25s cubic-bezier(0.28,0.11,0.32,1); }
        .multi-btn.selected { border-color:#bf5af2; background:rgba(191,90,242,0.12); color:#fff; }
        .multi-btn:hover { border-color:#636366; }
        .input-field { width:100%; background:#000; border:0.5px solid #38383a; color:#fff; padding:12px; border-radius:10px; font-size:1rem; box-sizing:border-box; font-family:inherit; }
        .input-field:focus { outline:none; border-color:#bf5af2; box-shadow:0 0 0 3px rgba(191,90,242,0.15); }
        .next-btn { width:100%; padding:16px; background:#bf5af2; color:#fff; border:none; border-radius:14px; font-weight:800; font-size:0.95rem; cursor:pointer; text-transform:uppercase; letter-spacing:0.5px; margin-top:10px; transition:all 0.25s cubic-bezier(0.28,0.11,0.32,1); }
        .next-btn:hover { background:#d4a0ff; transform:translateY(-1px); }
        .next-btn:active { transform:scale(0.98); }
        .next-btn:disabled { background:#38383a; color:#636366; cursor:not-allowed; transform:none; }
        .back-btn-inline { display:inline-block; padding:10px 18px; background:none; border:0.5px solid #38383a; color:#98989d; border-radius:10px; cursor:pointer; font-size:0.85rem; font-weight:600; transition:all 0.2s; margin-top:8px; font-family:inherit; }
        .back-btn-inline:hover { border-color:#636366; color:#fff; }
        .progress-bar { height:3px; background:#1c1c1e; border-radius:2px; margin-bottom:20px; overflow:hidden; }
        .progress-fill { height:100%; background:linear-gradient(90deg,#bf5af2,#ff375f); transition:width 0.5s ease; border-radius:2px; }
        .severity-row { display:flex; align-items:center; justify-content:space-between; padding:10px 0; border-bottom:0.5px solid #2c2c2e; }
        .severity-row:last-child { border:none; }
        .severity-label { color:#fff; font-weight:600; font-size:0.9rem; }
        .severity-btns { display:flex; gap:4px; }
        .sev-btn { padding:6px 10px; border:0.5px solid #38383a; background:#1c1c1e; color:#98989d; border-radius:8px; cursor:pointer; font-size:0.75rem; transition:all 0.2s; font-family:inherit; }
        .sev-btn:active { transform:scale(0.95); }
        .sev-btn.s1 { } .sev-btn.s2 { } .sev-btn.s3 { } .sev-btn.s4 { }
        .sev-btn.active.s1 { background:#1b3a1b; border-color:#30d158; color:#30d158; }
        .sev-btn.active.s2 { background:#3a2e00; border-color:#ffd60a; color:#ffd60a; }
        .sev-btn.active.s3 { background:#3a2100; border-color:#ff9f0a; color:#ff9f0a; }
        .sev-btn.active.s4 { background:#3a0a08; border-color:#ff453a; color:#ff453a; }
        /* Report styles */
        .report-section { background:#1c1c1e; border:0.5px solid #38383a; border-radius:16px; padding:20px; margin-bottom:16px; }
        .report-section h3 { color:#bf5af2; font-size:0.95rem; margin:0 0 12px 0; text-transform:uppercase; letter-spacing:0.8px; }
        .diagnosis-card { background:#000; border-left:3px solid #bf5af2; padding:14px; border-radius:0 10px 10px 0; margin-bottom:10px; }
        .cue-item { padding:10px 14px; background:#000; border-radius:10px; margin-bottom:6px; font-size:0.9rem; line-height:1.4; }
        .cue-item strong { color:#bf5af2; }
        .mobility-item { padding:10px 14px; background:#000; border:0.5px solid #2c2c2e; border-radius:10px; margin-bottom:8px; }
        .mobility-item .name { font-weight:700; color:#fff; }
        .mobility-item .rx { color:#30d158; font-size:0.85rem; }
        .mobility-item .why { color:#98989d; font-size:0.8rem; margin-top:4px; }
        .acc-preview { background:#000; border:0.5px solid #2c2c2e; border-radius:10px; padding:14px; margin-bottom:8px; }
        .acc-preview .acc-name { font-weight:800; color:#fff; }
        .acc-preview .acc-target { color:#bf5af2; font-size:0.8rem; }
        .acc-preview .week-row { font-size:0.8rem; color:#98989d; margin-top:6px; line-height:1.6; }
        .leverage-box { text-align:center; padding:24px; background:linear-gradient(135deg,rgba(191,90,242,0.06),rgba(255,55,95,0.04)); border:0.5px solid rgba(191,90,242,0.3); border-radius:16px; margin-bottom:16px; }
        .leverage-box .type { font-size:1.3rem; font-weight:800; color:#bf5af2; }
        .leverage-box .desc { color:#98989d; font-size:0.85rem; margin-top:8px; line-height:1.4; }
        .inject-btn { width:100%; padding:14px; border:none; border-radius:12px; font-weight:800; font-size:0.95rem; cursor:pointer; text-transform:uppercase; letter-spacing:0.5px; margin-top:8px; transition:all 0.25s cubic-bezier(0.28,0.11,0.32,1); }
        .inject-btn:active { transform:scale(0.98); }
        .inject-andre { background:#ff453a; color:#fff; } .inject-andre:hover { background:#ff6961; }
        .inject-base { background:#0a84ff; color:#fff; } .inject-base:hover { background:#409cff; }
        @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
        .fade-in { animation:fadeIn 0.4s cubic-bezier(0.28,0.11,0.32,1); }
    </style>
</head>
<body>
<div class="glossary-container">
    <a href="index.html" class="back-link">← Menu</a>
    <div class="glossary-header">
        <h1>MASTER GLOSSARY</h1>
        <p>Full diagnostic · Biomechanics · Injury mapping · Leverage analysis · Personalized programming</p>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    <div id="questionArea"></div>
    <div id="reportArea" style="display:none;"></div>
</div>

<script>
// ==========================================
// MASTER GLOSSARY ENGINE
// ==========================================

// ---------- STATE ----------
const S = {
    step: 0,
    sex: '', height: '', weight: 0, trainingAge: '', compStatus: '',
    injuries: [], injurySeverity: {}, injuryDuration: {},
    lifts: [],
    liftData: {},  // per-lift answers
    maxes: { squat:0, bench:0, deadlift:0 }
};

const totalSteps = 18; // approximate max

// ---------- PERSISTENCE: Save/Load baseline profile ----------
const PROFILE_KEY = 'glossary_baseline_profile';

function saveBaselineProfile() {
    const profile = {
        sex: S.sex, height: S.height, weight: S.weight,
        trainingAge: S.trainingAge, compStatus: S.compStatus,
        injuries: S.injuries, injurySeverity: S.injurySeverity, injuryDuration: S.injuryDuration
    };
    localStorage.setItem(PROFILE_KEY, JSON.stringify(profile));
}

function loadBaselineProfile() {
    try {
        const saved = JSON.parse(localStorage.getItem(PROFILE_KEY));
        if (saved && saved.sex && saved.height && saved.weight) {
            S.sex = saved.sex;
            S.height = saved.height;
            S.weight = saved.weight;
            S.trainingAge = saved.trainingAge || '';
            S.compStatus = saved.compStatus || '';
            S.injuries = saved.injuries || [];
            S.injurySeverity = saved.injurySeverity || {};
            S.injuryDuration = saved.injuryDuration || {};
            return true;
        }
    } catch(e) {}
    return false;
}

function clearBaselineProfile() {
    localStorage.removeItem(PROFILE_KEY);
    location.reload();
}

// ---------- NAVIGATION HISTORY (Back Button Support) ----------
const navHistory = [];
let isGoingBack = false;

function pushNav(fn) {
    // Don't push if we're navigating back (the function is already in the stack)
    if (isGoingBack) return;
    // Don't push duplicate of same function consecutively
    if (navHistory.length > 0 && navHistory[navHistory.length - 1] === fn) return;
    navHistory.push(fn);
}

function goBack() {
    if (navHistory.length > 1) {
        navHistory.pop(); // remove current screen
        const prev = navHistory[navHistory.length - 1]; // get previous
        isGoingBack = true;
        prev(); // re-render it (pushNav will be skipped due to flag)
        isGoingBack = false;
    }
}

function backButton(extraStyle) {
    // Always show back button if there's history (check after push)
    return `<button class="back-btn-inline" onclick="goBack()" style="${extraStyle||''}">← Back</button>`;
}

function progress(step) {
    const pct = Math.min(100, Math.round((step / totalSteps) * 100));
    document.getElementById('progressFill').style.width = pct + '%';
}

// ---------- RENDER HELPERS ----------
const QA = document.getElementById('questionArea');

function card(phase, html) {
    return `<div class="phase-card fade-in"><div class="phase-label">${phase}</div>${html}</div>`;
}

function singleSelect(options, callback, grid) {
    const cls = grid ? 'opt-grid' : '';
    return `<div class="${cls}">${options.map((o,i) =>
        `<button class="opt-btn" onclick="(${callback})('${o.id||o}')">${o.label||o}</button>`
    ).join('')}</div>`;
}

// ---------- PHASE 1: PROFILE ----------
function showQ1() {
    S.step = 1; progress(1);
    pushNav(showQ1);
    QA.innerHTML = card('Phase 1 — Athlete Profile', `
        <div class="q-title">What is your biological sex?</div>
        <div class="q-subtitle">This affects leverage analysis and formula calculations.</div>
        <div class="opt-grid">
            <button class="opt-btn" onclick="S.sex='male';showQ2()">Male</button>
            <button class="opt-btn" onclick="S.sex='female';showQ2()">Female</button>
        </div>
    `);
}

function showQ2() {
    S.step = 2; progress(2);
    pushNav(showQ2);
    QA.innerHTML = card('Phase 1 — Athlete Profile', `
        <div class="q-title">What is your height?</div>
        <div class="q-subtitle">Used to estimate your leverage profile and limb proportions.</div>
        ${singleSelect([
            {id:'under54',label:"Under 5'4\" (163cm)"},
            {id:'54-57',label:"5'4\" – 5'7\" (163-170cm)"},
            {id:'58-510',label:"5'8\" – 5'10\" (173-178cm)"},
            {id:'511-61',label:"5'11\" – 6'1\" (180-185cm)"},
            {id:'62plus',label:"6'2\"+ (188cm+)"}
        ], "h=>{S.height=h;showQ3()}")}
        ${backButton()}
    `);
}

function showQ3() {
    S.step = 3; progress(3);
    pushNav(showQ3);
    QA.innerHTML = card('Phase 1 — Athlete Profile', `
        <div class="q-title">What is your bodyweight?</div>
        <div class="q-subtitle">Used for leverage estimation and load calculations.</div>
        <input type="number" class="input-field" id="bwInput" placeholder="Bodyweight in lbs" style="margin-bottom:12px;" value="${S.weight||''}">
        <button class="next-btn" onclick="const v=parseFloat(document.getElementById('bwInput').value);if(v>0){S.weight=v;showQ4();}">Continue</button>
        ${backButton()}
    `);
}

function showQ4() {
    S.step = 4; progress(4);
    pushNav(showQ4);
    QA.innerHTML = card('Phase 1 — Athlete Profile', `
        <div class="q-title">How long have you been seriously training the powerlifts?</div>
        ${singleSelect([
            {id:'<1',label:'Under 1 year'},
            {id:'1-3',label:'1–3 years'},
            {id:'3-5',label:'3–5 years'},
            {id:'5-10',label:'5–10 years'},
            {id:'10+',label:'10+ years'}
        ], "a=>{S.trainingAge=a;showQ5()}")}
        ${backButton()}
    `);
}

function showQ5() {
    S.step = 5; progress(5);
    pushNav(showQ5);
    QA.innerHTML = card('Phase 1 — Athlete Profile', `
        <div class="q-title">What's your competition status?</div>
        ${singleSelect([
            {id:'training',label:'Just training — no meet planned'},
            {id:'prepping',label:'Prepping for a meet within 12 weeks'},
            {id:'between',label:'Between meets — off-season'},
            {id:'first',label:'First meet coming up'}
        ], "a=>{S.compStatus=a;showQ6()}")}
        ${backButton()}
    `);
}

// ---------- PHASE 2: INJURIES ----------
const bodyParts = ['Knees','Low Back','Upper Back','Shoulders','Hips','Elbows','Wrists','Neck','Ankles'];

function showQ6() {
    S.step = 6; progress(6);
    pushNav(showQ6);
    QA.innerHTML = card('Phase 2 — Injury Mapping', `
        <div class="q-title">Do you have any current injuries or pain points?</div>
        <div class="q-subtitle">Select all that apply. This filters out exercises that could aggravate these areas.</div>
        <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px;" id="injuryBtns">
            ${bodyParts.map(p => `<span class="multi-btn" onclick="toggleInjury(this,'${p}')">${p}</span>`).join('')}
        </div>
        <button class="multi-btn" onclick="S.injuries=[];saveBaselineProfile();showQ8_lifts()" style="border-color:#30d158;color:#30d158;display:block;width:100%;text-align:center;margin-top:8px;">No injuries — I'm healthy</button>
        <button class="next-btn" id="injNextBtn" onclick="if(S.injuries.length)showQ7()" disabled style="margin-top:12px;">Continue with selected injuries</button>
        ${backButton()}
    `);
}

window.toggleInjury = function(el, part) {
    el.classList.toggle('selected');
    if(S.injuries.includes(part)) S.injuries = S.injuries.filter(x=>x!==part);
    else S.injuries.push(part);
    document.getElementById('injNextBtn').disabled = S.injuries.length === 0;
};

function showQ7() {
    S.step = 7; progress(7);
    pushNav(showQ7);
    let html = `<div class="q-title">How severe is each injury?</div>
        <div class="q-subtitle">This determines whether we modify, avoid, or prescribe rehab for each area.</div>`;
    S.injuries.forEach(part => {
        html += `<div class="severity-row">
            <span class="severity-label">${part}</span>
            <div class="severity-btns">
                <button class="sev-btn s1" onclick="setSeverity('${part}',1,this)">Tight/Stiff</button>
                <button class="sev-btn s2" onclick="setSeverity('${part}',2,this)">Nagging</button>
                <button class="sev-btn s3" onclick="setSeverity('${part}',3,this)">Limiting</button>
                <button class="sev-btn s4" onclick="setSeverity('${part}',4,this)">Acute</button>
            </div>
        </div>`;
    });
    html += `<button class="next-btn" id="sevNextBtn" onclick="checkSeverityDone()" disabled>Continue</button>`;
    html += backButton();
    QA.innerHTML = card('Phase 2 — Injury Mapping', html);
}

window.setSeverity = function(part, level, el) {
    S.injurySeverity[part] = level;
    el.parentElement.querySelectorAll('.sev-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    const allSet = S.injuries.every(p => S.injurySeverity[p]);
    document.getElementById('sevNextBtn').disabled = !allSet;
};

window.checkSeverityDone = function() {
    showQ7b();
};

function showQ7b() {
    S.step = 7.5; progress(7.5);
    pushNav(showQ7b);
    let html = `<div class="q-title">How long have you been dealing with each injury?</div>`;
    S.injuries.forEach(part => {
        html += `<div style="margin-bottom:12px;">
            <div style="font-weight:600;color:#fff;margin-bottom:6px;">${part}</div>
            <div style="display:flex;flex-wrap:wrap;gap:4px;">
                <button class="sev-btn" onclick="setDuration('${part}','<2w',this)">< 2 weeks</button>
                <button class="sev-btn" onclick="setDuration('${part}','2-6w',this)">2–6 weeks</button>
                <button class="sev-btn" onclick="setDuration('${part}','1-3m',this)">1–3 months</button>
                <button class="sev-btn" onclick="setDuration('${part}','3m+',this)">3+ months</button>
                <button class="sev-btn" onclick="setDuration('${part}','chronic',this)">Chronic</button>
            </div>
        </div>`;
    });
    html += `<button class="next-btn" id="durNextBtn" onclick="saveBaselineProfile();showQ8_lifts()" disabled>Continue</button>`;
    html += backButton();
    QA.innerHTML = card('Phase 2 — Injury Mapping', html);
}

window.setDuration = function(part, dur, el) {
    S.injuryDuration[part] = dur;
    el.parentElement.querySelectorAll('.sev-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    const allSet = S.injuries.every(p => S.injuryDuration[p]);
    document.getElementById('durNextBtn').disabled = !allSet;
};

// ---------- PHASE 3: LIFT SELECTION ----------
function showQ8_lifts() {
    S.step = 8; progress(8);
    pushNav(showQ8_lifts);

    // Show saved profile summary if available
    let profileSummary = '';
    if (S.sex && S.height && S.weight) {
        const heightLabel = S.height.replace('under54',"Under 5'4\"").replace('54-57',"5'4\"-5'7\"").replace('58-510',"5'8\"-5'10\"").replace('511-61',"5'11\"-6'1\"").replace('62plus',"6'2\"+");
        const injuryLabel = S.injuries.length ? S.injuries.join(', ') : 'None';
        profileSummary = `<div style="background:#000;border:0.5px solid #38383a;border-radius:12px;padding:14px;margin-bottom:16px;font-size:0.82rem;">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
                <span style="color:#bf5af2;font-weight:700;font-size:0.7rem;text-transform:uppercase;letter-spacing:1px;">Your Profile</span>
                <button onclick="clearBaselineProfile()" style="background:none;border:0.5px solid #48484a;color:#98989d;padding:4px 10px;border-radius:6px;font-size:0.72rem;cursor:pointer;font-family:inherit;">Edit Profile</button>
            </div>
            <div style="color:#98989d;line-height:1.6;">
                ${S.sex.charAt(0).toUpperCase()+S.sex.slice(1)} · ${heightLabel} · ${S.weight} lbs · ${S.trainingAge || '?'} yrs training<br>
                Injuries: ${injuryLabel}
            </div>
        </div>`;
    }

    QA.innerHTML = card('Phase 3 — Lift Selection', `
        ${profileSummary}
        <div class="q-title">Which lift(s) do you want to analyze?</div>
        <div class="q-subtitle">Select all that need work. We'll run a deep dive on each one.</div>
        <div style="display:flex;gap:8px;margin-bottom:14px;">
            <span class="multi-btn" onclick="toggleLift(this,'squat')" style="flex:1;text-align:center;padding:16px;font-weight:800;font-size:1.1em;">Squat</span>
            <span class="multi-btn" onclick="toggleLift(this,'bench')" style="flex:1;text-align:center;padding:16px;font-weight:800;font-size:1.1em;">Bench</span>
            <span class="multi-btn" onclick="toggleLift(this,'deadlift')" style="flex:1;text-align:center;padding:16px;font-weight:800;font-size:1.1em;">Deadlift</span>
        </div>
        <div class="q-title" style="font-size:0.85rem;margin-top:16px;">Enter your current maxes (for load calculations)</div>
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px;">
            <div><label style="font-size:0.7rem;color:#98989d;">Squat</label><input type="number" class="input-field" id="maxSq" placeholder="0" value="${S.maxes.squat||''}"></div>
            <div><label style="font-size:0.7rem;color:#98989d;">Bench</label><input type="number" class="input-field" id="maxBn" placeholder="0" value="${S.maxes.bench||''}"></div>
            <div><label style="font-size:0.7rem;color:#98989d;">Deadlift</label><input type="number" class="input-field" id="maxDl" placeholder="0" value="${S.maxes.deadlift||''}"></div>
        </div>
        <button class="next-btn" id="liftNextBtn" onclick="startLiftDives()" disabled>Begin Deep Dive</button>
        ${backButton()}
    `);
}

window.toggleLift = function(el, lift) {
    el.classList.toggle('selected');
    if(S.lifts.includes(lift)) S.lifts = S.lifts.filter(x=>x!==lift);
    else S.lifts.push(lift);
    document.getElementById('liftNextBtn').disabled = S.lifts.length === 0;
};

let currentLiftIdx = 0;

function startLiftDives() {
    S.maxes.squat = parseFloat(document.getElementById('maxSq').value)||0;
    S.maxes.bench = parseFloat(document.getElementById('maxBn').value)||0;
    S.maxes.deadlift = parseFloat(document.getElementById('maxDl').value)||0;
    currentLiftIdx = 0;
    runLiftDive(S.lifts[0]);
}

// ---------- PHASE 3: LIFT DEEP DIVES ----------

// ====== SQUAT ======
const squatQuestions = {
    stance: { text:"What's your squat stance?", opts:[
        {id:'narrow',label:'Narrow (shoulder width or less)'},
        {id:'medium',label:'Medium (slightly outside shoulders)'},
        {id:'wide',label:'Wide (well outside shoulders)'}
    ]},
    barPos: { text:"Where do you carry the bar?", opts:[
        {id:'high',label:'High bar (on traps)'},
        {id:'low',label:'Low bar (on rear delts)'},
        {id:'varies',label:'I switch between them'}

const liftQMap = { squat: squatQuestions, bench: benchQuestions, deadlift: deadliftQuestions };
const liftColors = { squat:'#4caf50', bench:'#2196f3', deadlift:'#9c27b0' };

let currentQKeys = [];
let currentQIdx = 0;
let currentLift = '';

function runLiftDive(lift) {
    currentLift = lift;
    S.liftData[lift] = {};
    const qs = liftQMap[lift];
    currentQKeys = Object.keys(qs);
    currentQIdx = 0;
    showLiftQ();
}

function showLiftQ() {
    const lift = currentLift;
    const qs = liftQMap[lift];
    const key = currentQKeys[currentQIdx];
    const q = qs[key];
    const color = liftColors[lift];
    const stepNum = 9 + currentLiftIdx * 6 + currentQIdx;
    S.step = stepNum; progress(stepNum);
    pushNav(showLiftQ);

    if(q.multi) {
        // Multi-select question
        S.liftData[lift][key] = [];
        QA.innerHTML = card(`Phase 3 — ${lift.charAt(0).toUpperCase()+lift.slice(1)} Deep Dive`, `
            <div class="q-title">${q.text}</div>
            <div class="q-subtitle">Select all that apply.</div>
            <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px;" id="multiArea">
                ${q.opts.map(o => `<span class="multi-btn" onclick="toggleMultiQ(this,'${lift}','${key}','${o.id}')">${o.label}</span>`).join('')}
            </div>
            <button class="next-btn" onclick="advanceLiftQ()">Continue</button>
            ${backButton()}
        `);
    } else {
        QA.innerHTML = card(`Phase 3 — ${lift.charAt(0).toUpperCase()+lift.slice(1)} Deep Dive`, `
            <div class="q-title">${q.text}</div>
            ${q.opts.map(o => `<button class="opt-btn" onclick="S.liftData['${lift}']['${key}']='${o.id}';advanceLiftQ()">${o.label}</button>`).join('')}
            ${backButton()}
        `);
    }
}

window.toggleMultiQ = function(el, lift, key, id) {
    el.classList.toggle('selected');
    const arr = S.liftData[lift][key];
    if(arr.includes(id)) S.liftData[lift][key] = arr.filter(x=>x!==id);
    else arr.push(id);
};

function advanceLiftQ() {
    currentQIdx++;
    if(currentQIdx >= currentQKeys.length) {
        // Done with this lift, move to next or generate report
        currentLiftIdx++;
        if(currentLiftIdx < S.lifts.length) {
            runLiftDive(S.lifts[currentLiftIdx]);
        } else {
            generateReport();
        }
    } else {
        showLiftQ();
    }
}

function getLeverageProfile() {
    const h = S.height;
    const w = S.weight;
    const sex = S.sex;
    let type = '', desc = '';

    if(h === 'under54' || h === '54-57') {
        if(w > (sex==='male'?180:150)) {
            type = 'Compact Powerhouse';
            desc = 'Short limbs relative to a thick torso. Mechanically advantaged on squat and bench — shorter range of motion. Deadlift may require wider stance or sumo to clear the belly. Generally strong leverages for all three lifts.';
        } else {
            type = 'Short-Limbed Lifter';
            desc = 'Shorter overall proportions with good mechanical advantage. Squat and bench typically feel natural. Conventional deadlift may be strong due to reduced bar travel. Watch for depth issues on squat if hip mobility is limited.';
        }
    } else if(h === '58-510') {
        if(w > (sex==='male'?220:165)) {
            type = 'Balanced Build';
            desc = 'Medium proportions with solid mass. Generally good leverages across all three lifts. Sticking points are more likely technique or strength-specific rather than leverage-driven.';
        } else {
            type = 'Medium-Frame Lifter';
            desc = 'Average proportions. Versatile across all three lifts. Performance differences between lifts are likely driven by training history and muscle development rather than pure leverages.';
        }
    } else if(h === '511-61') {
        if(w > (sex==='male'?240:180)) {
            type = 'Long-Torsoed Powerlifter';
            desc = 'Likely longer torso with proportional limbs. Bench may be a relative strength with good chest mass. Squat depth can be challenging — may benefit from a wider stance. Deadlift leverages are fair; bar path management is critical.';
        } else {
            type = 'Tall Intermediate';
            desc = 'Longer limbs relative to body mass. Greater range of motion on all lifts means more work per rep. Technique precision matters more at these proportions. Deadlift is often the strongest relative lift due to longer arms.';
        }
    } else {
        type = 'Long-Limbed Lifter';
        desc = 'Significantly longer limbs, especially femurs and arms. Squat requires excellent mobility and positional strength through a greater range of motion. Bench has a long bar path — arch and leg drive become essential. Deadlift may be mechanically advantaged due to long arms reducing range of motion, but keeping the bar close is critical.';
    }

    return { type, desc };
}

// ---------- DIAGNOSIS ENGINE ----------
function diagnoseLift(lift) {
    const d = S.liftData[lift];
    if(!d) return null;

    let diagnosis = '';
    let cues = [];
    let mobility = [];
    let accessories = [];
    const injuries = S.injuries;
    const severity = S.injurySeverity;
    const isNovice = S.trainingAge === '<1' || S.trainingAge === '1-3';
    const isTall = S.height === '511-61' || S.height === '62plus';
    const isShort = S.height === 'under54' || S.height === '54-57';
    const isHeavy = S.weight > (S.sex==='male'?220:165);

    // Helper to check if an exercise is contraindicated
    function safe(bodyRegions) {
        for(const region of bodyRegions) {
            if(injuries.includes(region) && severity[region] >= 3) return false;
        }
        return true;
    }

    if(lift === 'squat') {
        const fp = d.failPoint;
        const actions = d.bodyAction || [];
        const feel = d.feeling;
        const stance = d.stance;
        const bar = d.barPos;

        if(fp === 'hole') {
            if(actions.includes('fold')) {
                diagnosis = 'Your squat fails in the hole because your upper back cannot maintain position under load. The thoracic spine rounds, your chest drops, and the bar shifts forward — increasing the moment arm on your hips and low back. ';
                if(isTall) diagnosis += 'At your height, this is amplified because the longer torso creates a greater lever arm. ';
                if(bar === 'low') diagnosis += 'Low bar position demands more upper back rigidity, which is currently your limiter. ';
                diagnosis += 'The primary deficit is upper back and lat strength combined with bracing endurance.';

                cues = [
                    {text:'Drive your traps into the bar as you stand up — think "chest up" is a back cue, not a chest cue.', why:'Activates the erectors and traps to fight the forward fold.'},
                    {text:'Breathe and brace BEFORE you unrack. Hold that brace the entire rep — don\'t rebreathe at the top until the set is done.', why:'Losing intra-abdominal pressure mid-rep is the most common cause of folding.'},
                    {text:'Push your elbows under the bar (high bar) or squeeze shoulder blades hard (low bar) before you descend.', why:'Sets the upper back shelf before load is applied.'}
                ];

                if(safe(['Upper Back','Shoulders'])) accessories.push({n:'SSB Squat', s:'squat', pct:[0.60,0.65,0.68,0.63,0.55,0.50], reps:['3x6','3x5','3x4','2x3','2x2','2x5'], why:'Forces upper back to work harder without hand support on the bar.'});
                if(safe(['Upper Back','Low Back'])) accessories.push({n:'Front Squat', s:'squat', pct:[0.50,0.55,0.58,0.53,0.48,0.45], reps:['3x6','3x5','3x4','2x3','2x2','2x5'], why:'If you fold forward, you drop the bar. Teaches upright torso under load.'});
                if(safe(['Shoulders','Low Back'])) accessories.push({n:'Pendlay Row', s:'deadlift', pct:[0.45,0.50,0.53,0.48,0.42,0.40], reps:['4x6','4x5','3x5','3x3','2x3','3x6'], why:'Builds the lat and upper back thickness needed to hold position.'});
                accessories.push({n:'Weighted Planks', s:'squat', pct:[0,0,0,0,0,0], reps:['3x45s','3x50s','3x55s','3x45s','3x30s','3x30s'], why:'Core endurance under load — direct brace training.'});

                mobility = [
                    {name:'Foam Roller Thoracic Extensions', rx:'2x10 reps', why:'Opens up the thoracic spine to allow a more upright torso position.'},
                    {name:'Banded Lat Stretch', rx:'2x30s per side', why:'Tight lats can pull the torso forward. This creates space for an upright squat.'},
                    {name:'Wall Slides', rx:'2x10 slow', why:'Activates lower traps and teaches scapular control under overhead position — carries over to bar position.'}
                ];

            } else if(actions.includes('hips_shoot')) {
                diagnosis = 'Your hips shoot up out of the hole but the bar doesn\'t move with them. This means your quads aren\'t producing enough force to extend the knees, so your body compensates by shifting the load to the posterior chain (glutes and back). ';
                if(stance === 'narrow') diagnosis += 'A narrow stance places more demand on the quads, which may be exacerbating this. ';
                diagnosis += 'The result is a good-morning pattern where you\'re essentially squatting up with your back instead of your legs.';

                cues = [
                    {text:'Push your knees forward and out as you drive up — think "spread the floor" with your feet.', why:'Forces the quads to stay engaged rather than letting the hips take over.'},
                    {text:'On the way down, control the descent for a full 2-count. No dive-bombing.', why:'A controlled eccentric loads the quads. A fast drop lets you bounce off passive structures.'},
                    {text:'Cue "legs first" on the way up — push the floor away before you think about your hips.', why:'Sequences the lift to use quads before defaulting to hip extension.'}
                ];

                if(safe(['Knees'])) accessories.push({n:'Pause Squat (3s)', s:'squat', pct:[0.58,0.63,0.66,0.61,0.53,0.48], reps:['3x4','3x3','3x3','2x2','2x2','2x4'], why:'Removes the stretch reflex. Forces pure quad strength out of the hole.'});
                if(safe(['Knees','Low Back'])) accessories.push({n:'Belt Squat', s:'squat', pct:[0.50,0.55,0.58,0.53,0.45,0.42], reps:['3x10','3x8','3x6','3x5','2x5','3x8'], why:'Loads the quads without spinal compression. Pure leg builder.'});
                if(safe(['Knees'])) accessories.push({n:'Leg Press', s:'squat', pct:[1.10,1.20,1.30,1.10,0.90,0.80], reps:['4x10','4x8','3x8','3x6','2x6','3x10'], why:'High-volume quad work in a stable, spine-friendly position.'});
                if(safe(['Knees'])) accessories.push({n:'Leg Extensions', s:'squat', pct:[0.20,0.22,0.25,0.20,0.15,0.15], reps:['3x15','3x12','3x10','2x10','2x8','3x15'], why:'Isolation quad work. VMO strength helps stabilize the knee at depth.'});

                mobility = [
                    {name:'Couch Stretch', rx:'2x45s per side', why:'Opens the hip flexors to allow proper quad engagement at depth.'},
                    {name:'Goblet Squat Hold', rx:'3x20s with light weight', why:'Groove the pattern of keeping the torso upright and knees forward.'},
                    {name:'Banded Terminal Knee Extension', rx:'3x20 per side', why:'Activates the VMO — the quad muscle most responsible for knee stability at depth.'}
                ];

            } else {
                diagnosis = 'You get stuck in the hole without a specific directional failure. This indicates a general deficit in reversal strength — the ability to change direction from the eccentric to the concentric under heavy load. ';
                if(isNovice) diagnosis += 'At your training age, this often improves significantly with pause work and time under tension training. ';
                diagnosis += 'Building positional strength and confidence at the bottom will address this directly.';

                cues = [
                    {text:'Own the bottom position. Don\'t rush through it — control down, brief pause, then explode.', why:'Teaching your nervous system that the bottom is a strong position, not a scary one.'},
                    {text:'Drive your back into the bar as you stand. The bar should feel like it\'s part of your body.', why:'Connects the upper body to the lower body so force transfers efficiently.'}
                ];

                if(safe(['Knees','Low Back'])) accessories.push({n:'Pin Squat (Low)', s:'squat', pct:[0.55,0.60,0.65,0.60,0.50,0.48], reps:['3x3','3x3','3x2','2x2','2x1','2x3'], why:'Starts from a dead stop at the bottom. Pure concentric strength builder.'});
                if(safe(['Knees'])) accessories.push({n:'1.5 Rep Squat', s:'squat', pct:[0.50,0.53,0.55,0.50,0.45,0.43], reps:['3x5','3x4','3x3','2x3','2x2','3x5'], why:'Extra time at the sticking point per rep. Builds tolerance to the bottom position.'});
                if(safe(['Knees','Low Back'])) accessories.push({n:'Box Squat', s:'squat', pct:[0.60,0.65,0.68,0.63,0.55,0.52], reps:['4x3','3x3','3x2','2x2','2x1','3x3'], why:'Teaches you to generate force from a static position. Eliminates the bounce.'});

                mobility = [
                    {name:'90/90 Hip Stretch', rx:'2x45s per side', why:'Improves hip internal and external rotation — critical for comfortable depth.'},
                    {name:'Deep Squat Hold with Plate', rx:'3x30s', why:'Spend time in the position you need to be strong in.'}
                ];
            }

        } else if(fp === 'mid') {
            diagnosis = 'Your squat stalls in the midrange — you get out of the hole but can\'t finish. This is typically a posterior chain (glutes/hamstrings) deficit combined with potentially losing brace integrity partway through the lift. ';
            if(actions.includes('shift')) diagnosis += 'The lateral shift you\'re experiencing suggests an asymmetry between sides that should be addressed with unilateral work. ';

            cues = [
                {text:'Squeeze your glutes hard at the sticking point — don\'t just push, DRIVE your hips through.', why:'The midrange is where hip extension takes over from knee extension. Glutes must fire.'},
                {text:'Think about "standing tall" rather than "pushing up." The cue changes the movement pattern.', why:'Shifts focus to full hip extension instead of just pushing against the bar.'}
            ];

            if(safe(['Low Back'])) accessories.push({n:'Anderson Squat', s:'squat', pct:[0.65,0.70,0.75,0.68,0.58,0.55], reps:['3x3','3x2','2x2','2x1','2x1','2x3'], why:'Start from the exact sticking point. Builds strength exactly where you fail.'});
            if(safe(['Knees'])) accessories.push({n:'Tempo Squat (5-3-0)', s:'squat', pct:[0.50,0.53,0.55,0.50,0.45,0.43], reps:['3x5','3x4','3x3','2x3','2x2','3x5'], why:'Slow eccentric forces you to control through the midrange. Builds positional awareness.'});
            if(safe(['Hips','Low Back'])) accessories.push({n:'Hip Thrust', s:'deadlift', pct:[0.40,0.45,0.48,0.43,0.38,0.35], reps:['4x10','4x8','3x8','3x6','2x6','3x10'], why:'Direct glute strength — the muscle responsible for driving through the midrange.'});
            if(actions.includes('shift')) accessories.push({n:'Split Squat', s:'squat', pct:[0.20,0.22,0.25,0.20,0.18,0.15], reps:['3x10','3x8','3x8','2x6','2x6','3x10'], why:'Corrects side-to-side asymmetry by forcing each leg to work independently.'});

            mobility = [
                {name:'Pigeon Stretch', rx:'2x45s per side', why:'Opens glutes to allow full hip extension through the midrange.'},
                {name:'Banded Hip Distraction', rx:'2x30s per side', why:'Creates space in the hip joint for better glute recruitment.'}
            ];

        } else if(fp === 'lockout') {
            diagnosis = 'You fail at lockout — you grind past the hole and midrange but can\'t finish standing up. This is typically a glute and/or low back endurance issue. By the time you reach lockout, your posterior chain is gassed from fighting the earlier phases.';

            cues = [
                {text:'Drive your hips through at the top. Think about humping the bar.', why:'Direct glute squeeze cue to finish hip extension.'},
                {text:'Lock your knees THEN your hips. Sequence the lockout.', why:'Many lifters try to lock everything at once and end up in no-man\'s-land.'}
            ];

            if(safe(['Low Back'])) accessories.push({n:'Anderson Squat', s:'squat', pct:[0.70,0.75,0.80,0.73,0.60,0.58], reps:['3x3','3x2','2x2','2x1','2x1','2x3'], why:'Build top-end strength specifically.'});
            accessories.push({n:'Heavy Walkout', s:'squat', pct:[1.03,1.06,1.08,1.03,0,0], reps:['3x15s','3x15s','2x15s','2x10s','OFF','OFF'], why:'CNS priming. Teaches your body that heavy weight at the top is normal.'});
            if(safe(['Hips','Low Back'])) accessories.push({n:'Hip Thrust', s:'deadlift', pct:[0.45,0.50,0.53,0.48,0.40,0.38], reps:['4x10','4x8','3x8','3x6','2x6','3x10'], why:'Builds lockout-specific glute power.'});

            mobility = [
                {name:'Standing Hip Flexor Stretch', rx:'2x30s per side', why:'Tight hip flexors inhibit glute activation at lockout. Release them to unlock glute power.'}
            ];

        } else if(fp === 'walkout') {
            diagnosis = 'The bar feels too heavy before you even squat. This is a CNS confidence and upper back stability issue. Your body is perceiving the load as threatening before the lift even begins.';

            cues = [
                {text:'Unrack with authority. Drive your traps into the bar and STAND UP with the weight. Two steps back, no more.', why:'A tentative unrack starts the lift in a defensive state. Be aggressive.'},
                {text:'Take a breath and brace BEFORE you unrack. You should feel like a pressurized tank before the bar leaves the hooks.', why:'Pre-bracing sets your core before the load hits.'}
            ];

            accessories.push({n:'Heavy Walkout', s:'squat', pct:[1.05,1.08,1.10,1.05,0,0], reps:['3x15s','3x15s','2x15s','2x10s','OFF','OFF'], why:'Desensitize the CNS to supra-maximal loads. Makes your working weight feel lighter.'});
            if(safe(['Low Back','Knees'])) accessories.push({n:'Supramax Eccentric', s:'squat', pct:[0.98,1.02,1.05,0.98,0,0], reps:['3x1','2x1','2x1','2x1','OFF','OFF'], why:'Controlled lowering with more than your max. Teaches your body to handle heavy loads.'});

            mobility = [
                {name:'Thoracic Foam Rolling', rx:'2 min', why:'An immobile upper back makes the bar feel heavier because it can\'t distribute the load.'},

            ];

        } else if(fp === 'depth') {
            diagnosis = 'You struggle to hit proper squat depth. This is almost always a mobility issue — limited ankle dorsiflexion, hip flexion, or both. ';
            if(isTall) diagnosis += 'At your height, hitting depth requires more hip and ankle range of motion than shorter lifters. ';
            if(stance === 'narrow') diagnosis += 'A narrow stance requires more ankle mobility. Consider widening slightly. ';

            cues = [
                {text:'Push your knees out over your pinky toe as you descend. Create space for your hips.', why:'External rotation opens the hip joint to allow deeper flexion.'},

    html += `<div class="report-section" style="border-color:#bb86fc;">
        <h3>Assessment Report</h3>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:0.85rem;">
            <div>Sex: <strong>${S.sex}</strong></div>
            <div>Height: <strong>${S.height.replace('under54',"Under 5'4\"").replace('54-57',"5'4\"-5'7\"").replace('58-510',"5'8\"-5'10\"").replace('511-61',"5'11\"-6'1\"").replace('62plus',"6'2\"+")}</strong></div>
            <div>Bodyweight: <strong>${S.weight} lbs</strong></div>
            <div>Training Age: <strong>${S.trainingAge} years</strong></div>
            <div>Total: <strong>${total} lbs</strong></div>
            <div>Date: <strong>${today}</strong></div>
        </div>
    </div>`;

    // Leverage Profile
    html += `<div class="leverage-box">
        <div class="type">${leverage.type}</div>
        <div class="desc">${leverage.desc}</div>
    </div>`;

    // Injuries
    if(S.injuries.length) {
        html += `<div class="report-section"><h3>Injury Profile</h3>`;
        S.injuries.forEach(p => {
            const sev = S.injurySeverity[p];
            const dur = S.injuryDuration[p];
            const sevLabel = {1:'Tight/Stiff',2:'Nagging',3:'Limiting',4:'Acute'}[sev];
            const sevColor = {1:'#4caf50',2:'#ffb300',3:'#ff9800',4:'#f44336'}[sev];
            html += `<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #222;">
                <span style="font-weight:600;">${p}</span>
                <span><span style="color:${sevColor};font-weight:bold;">${sevLabel}</span> · ${dur}</span>
            </div>`;
        });
        html += `</div>`;
    }

    // Per-lift diagnosis
    let allAccessories = {};
    S.lifts.forEach(lift => {
        const result = diagnoseLift(lift);
        if(!result) return;
        const color = liftColors[lift];
        allAccessories[lift] = result.accessories;

        html += `<div class="report-section" style="border-left:4px solid ${color};">
            <h3 style="color:${color};">${lift.charAt(0).toUpperCase()+lift.slice(1)} Analysis</h3>
            <div class="diagnosis-card"><p style="line-height:1.6;margin:0;">${result.diagnosis}</p></div>`;

        // Cues
        if(result.cues.length) {
            html += `<div style="margin-top:14px;"><div style="font-size:0.75rem;color:${color};text-transform:uppercase;letter-spacing:1px;font-weight:bold;margin-bottom:8px;">Coaching Cues</div>`;
            result.cues.forEach(c => {
                html += `<div class="cue-item"><strong>→ ${c.text}</strong><div style="color:#888;font-size:0.8rem;margin-top:4px;">${c.why}</div></div>`;
            });
            html += `</div>`;
        }

        // Mobility
        if(result.mobility.length) {
            html += `<div style="margin-top:14px;"><div style="font-size:0.75rem;color:#4caf50;text-transform:uppercase;letter-spacing:1px;font-weight:bold;margin-bottom:8px;">Mobility Rx (Pre-Training)</div>`;
            result.mobility.forEach(m => {
                html += `<div class="mobility-item"><div class="name">${m.name} <span class="rx">${m.rx}</span></div><div class="why">${m.why}</div></div>`;
            });
            html += `</div>`;
        }

        // Accessories
        if(result.accessories.length) {
            html += `<div style="margin-top:14px;"><div style="font-size:0.75rem;color:#FFD700;text-transform:uppercase;letter-spacing:1px;font-weight:bold;margin-bottom:8px;">Accessory Prescription</div>`;
            result.accessories.forEach((acc,idx) => {
                const accMax = S.maxes[acc.s] || S.maxes[lift] || 0;
                const weekPreviews = acc.pct.map((p,w) => {
                    if(p===0) return `<span style="color:#555;">W${w+1}: OFF</span>`;
                    const load = accMax > 0 ? Math.round((accMax*p)/5)*5+' lbs' : Math.round(p*100)+'%';
                    return `W${w+1}: ${acc.reps[w]} @ ${load}`;
                }).join(' · ');
                html += `<div class="acc-preview">
                    <div class="acc-name">${acc.n}</div>
                    <div class="acc-target">${acc.why}</div>
                    <div class="week-row">${weekPreviews}</div>
                    <label style="display:flex;align-items:center;gap:6px;margin-top:6px;cursor:pointer;">
                        <input type="checkbox" checked class="report-acc-cb" data-lift="${lift}" data-idx="${idx}" style="accent-color:${color};width:16px;height:16px;">
                        <span style="color:#888;font-size:0.8rem;">Include in program</span>
                    </label>
                </div>`;
            });
            html += `</div>`;
        }

        html += `</div>`;
    });

    // Program injection
    html += `<div class="report-section" style="border-color:#FFD700;">
        <h3 style="color:#FFD700;">Add to Program</h3>
        <p style="color:#aaa;font-size:0.85rem;margin-bottom:14px;">Selected accessories will be injected into your program with periodized weights across all weeks.</p>
        <button class="inject-btn inject-andre" onclick="injectToProgram('andre')">Add to Andre Map Wave</button>
        <button class="inject-btn inject-base" onclick="injectToProgram('base')">Add to Base Map Linear</button>
        <button class="next-btn" style="background:#333;color:#aaa;margin-top:8px;" onclick="saveAssessment()">💾 Save Assessment for Later Comparison</button>
    </div>`;

    html += `</div>`;
    RA.innerHTML = html;

    // Store accessories for injection
    window._glossaryAccessories = allAccessories;
}

// ---------- PROGRAM INJECTION ----------
const dayPlacement = {
    squat: { andre: 2, base: 2 },      // Wednesday
    bench: { andre: 1, base: 1 },       // Tuesday
    deadlift: { andre: 5, base: 5 },    // Saturday
    ohp: { andre: 4, base: 4 }          // Friday
};

window.injectToProgram = function(program) {
    const allAcc = window._glossaryAccessories || {};
    const checkboxes = document.querySelectorAll('.report-acc-cb');
    let liftAccMap = {};

    // Collect checked accessories
    checkboxes.forEach(cb => {
        if(!cb.checked) return;
        const lift = cb.dataset.lift;
        const idx = parseInt(cb.dataset.idx);
        if(!liftAccMap[lift]) liftAccMap[lift] = [];
        if(allAcc[lift] && allAcc[lift][idx]) liftAccMap[lift].push(allAcc[lift][idx]);
    });

    const storageKey = program === 'andre' ? 'andreMapCustomLifts' : 'baseMapCustomLifts';
    let existing = [];
    try { existing = JSON.parse(localStorage.getItem(storageKey) || '[]'); } catch(e) {}

    let added = 0;
    Object.entries(liftAccMap).forEach(([lift, accs]) => {
        accs.forEach(acc => {
            const dayIdx = dayPlacement[acc.s] ? dayPlacement[acc.s][program] : 2;
            const isAndre = program === 'andre';
            const numWeeks = isAndre ? 6 : 4;
            existing.push({
                n: acc.n + ' 🔧',
                t: acc.n,
                p: acc.pct[0],
                r: acc.reps[0],
                s: acc.s,
                dayIndex: dayIdx,
                isAutoAcc: true,
                pctByWeek: acc.pct.slice(0, numWeeks),
                repsByWeek: acc.reps.slice(0, numWeeks)
            });
            added++;
        });
    });

    localStorage.setItem(storageKey, JSON.stringify(existing));

    // Show confirmation
    const btn = document.querySelector(program === 'andre' ? '.inject-andre' : '.inject-base');
    if(btn) {
        btn.innerText = `✅ ${added} accessories added to ${program === 'andre' ? 'Andre Map Wave' : 'Base Map Linear'}!`;
        btn.style.background = '#2e7d32';
        btn.disabled = true;
    }
};

// ---------- SAVE & COMPARE ----------
window.saveAssessment = function() {
    const history = JSON.parse(localStorage.getItem('glossaryHistory') || '[]');
    const entry = {
        date: new Date().toISOString(),
        profile: { sex: S.sex, height: S.height, weight: S.weight, trainingAge: S.trainingAge },
        injuries: S.injuries.map(p => ({ part: p, severity: S.injurySeverity[p], duration: S.injuryDuration[p] })),
        lifts: S.lifts,
        liftData: S.liftData,
        maxes: S.maxes,
        leverage: getLeverageProfile()
    };
    history.push(entry);
    localStorage.setItem('glossaryHistory', JSON.stringify(history));

    const btn = document.querySelector('[onclick="saveAssessment()"]');
    if(btn) {
        btn.innerText = `✅ Saved! (${history.length} assessment${history.length>1?'s':''} on file)`;
        btn.style.background = '#2e7d32';
        btn.style.color = '#fff';
        btn.disabled = true;
    }
};

// ---------- KICK OFF ----------
// If baseline profile is already saved, skip straight to lift selection
if (loadBaselineProfile()) {
    pushNav(showQ8_lifts);
    showQ8_lifts();
} else {
    showQ1();
}
</script>
