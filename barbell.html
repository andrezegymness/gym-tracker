<body>
<div class="bl-wrap">
    <a href="index.html" class="bl-back">← Menu</a>
    <div class="bl-header">
        <div class="bl-brand">Dre Calibration</div>

    <div id="barSelect" style="display:flex;gap:6px;margin-bottom:12px;justify-content:center;flex-wrap:wrap;"></div>
    <div style="display:flex;gap:6px;margin-bottom:16px;justify-content:center;">
        <button class="bl-toggle" id="puKg" onclick="setPlateUnit('kg')">KG Plates</button>
        <button class="bl-toggle" id="puLbs" onclick="setPlateUnit('lbs')">LBS Plates</button>
    </div>
    <div class="bl-tabs">
        <button class="bl-tab active" id="tabCalc" onclick="setTab('calc')">Calculate</button>
        <button class="bl-tab" id="tabReverse" onclick="setTab('reverse')">Reverse</button>
    </div>
    <div id="calcView">
        <div class="bl-card">
            <div class="bl-label">Target Weight</div>
            <div style="display:flex;gap:8px;align-items:center;">
                <input type="number" class="bl-input" id="targetInput" placeholder="0" oninput="onCalcInput()" style="flex:1;">
                <div style="display:flex;flex-direction:column;gap:4px;">
                    <button class="bl-toggle" id="iuLbs" onclick="setInputUnit('lbs')">LBS</button>
                    <button class="bl-toggle" id="iuKg" onclick="setInputUnit('kg')">KG</button>
                </div>
            </div>
        </div>
        <div id="calcResult"></div>
        <div id="calcOptions" style="display:flex;gap:6px;margin-bottom:14px;"></div>
        <button class="bl-reset" onclick="clearCalc()">Clear</button>
    </div>
    <div id="reverseView" style="display:none;">
        <div class="bl-card">
            <div class="bl-label">Tap plates to load the bar</div>

            <div id="reverseBar"></div>
            <div id="reverseTotal" style="text-align:center;margin-top:8px;"></div>
        </div>

        <div id="wuContent" style="display:none;margin-top:14px;">
            <div style="display:flex;gap:6px;margin-bottom:10px;" id="wuLiftBtns"></div>
            <div style="display:flex;gap:6px;margin-bottom:14px;" id="wuStyleBtns"></div>
            <div id="wuSets"></div>
        </div>

</div>
<canvas id="shareCanvas"></canvas>

<script>
const KG2LBS=2.20462, LBS2KG=1/KG2LBS;

// Slim competition plate specs: tall, narrow widths
const KG_PLATES=[
    {w:25,  color:"#DC2626",label:"25", tc:"#fff",h:140,pw:14},
    {w:20,  color:"#2563EB",label:"20", tc:"#fff",h:132,pw:13},
    {w:15,  color:"#EAB308",label:"15", tc:"#000",h:124,pw:12},
    {w:10,  color:"#16A34A",label:"10", tc:"#fff",h:110,pw:11},
    {w:5,   color:"#E5E7EB",label:"5",  tc:"#000",h:90, pw:9},
    {w:2.5, color:"#1c1c1e",label:"2.5",tc:"#fff",h:70, pw:8,bd:"#666"},
    {w:1.25,color:"#555",   label:"1.25",tc:"#fff",h:56, pw:7,bd:"#888"},
    {w:0.5, color:"#444",   label:"0.5", tc:"#aaa",h:44, pw:6,bd:"#777"}
];
const LBS_PLATES=[
    {w:45,  color:"#DC2626",label:"45", tc:"#fff",h:140,pw:14},
    {w:35,  color:"#2563EB",label:"35", tc:"#fff",h:128,pw:13},
    {w:25,  color:"#16A34A",label:"25", tc:"#fff",h:116,pw:12},
    {w:10,  color:"#E5E7EB",label:"10", tc:"#000",h:96, pw:10},
    {w:5,   color:"#6B7280",label:"5",  tc:"#fff",h:76, pw:9},
    {w:2.5, color:"#1c1c1e",label:"2.5",tc:"#fff",h:60, pw:8,bd:"#666"}
];
const BARS=[
    {label:"45 lb Standard",kg:20.4117,lbs:45},
    {label:"20 kg Olympic",kg:20,lbs:44.0924},
    {label:"25 kg Comp",kg:25,lbs:55.1156}
];

let S={tab:'calc',barIdx:0,pu:'kg',iu:'lbs',rp:[],ao:'exact',wuOpen:false,wuLift:'squat',wuStyle:'standard'};
function pl(){return S.pu==='kg'?KG_PLATES:LBS_PLATES;}
function br(){return BARS[S.barIdx];}

function calcPl(ps){let r=ps;const l=[];for(const p of pl()){while(r>=p.w-0.01){l.push(p);r-=p.w;}}return l;}

// For rounding, smallest plate is 2.5
function roundCalcPl(ps){
    const minP=2.5;
    const rounded=Math.round(ps/minP)*minP;
    const lower=Math.floor(ps/minP)*minP;
    const upper=Math.ceil(ps/minP)*minP;
    return{rounded,lower,upper};
}

function plateHTML(p,i){
    return `<div class="bl-plate" style="height:${p.h}px;width:${p.pw}px;background:${p.color};color:${p.tc};font-size:${p.pw<10?6:8}px;${p.bd?'border:1px solid '+p.bd+';':''}animation-delay:${i*0.05}s;">${p.label}</div>`;
}

function barHTML(pls){
    return `<div class="bl-bar"><div class="bl-collar-end"></div><div class="bl-collar-mid"></div><div class="bl-sleeve"></div><div class="bl-plates-area">${pls.map((p,i)=>plateHTML(p,i)).join('')}</div><div class="bl-endcap"></div><div class="bl-bar-ext"></div></div>`;
}

function renderBarSelect(){
    document.getElementById('barSelect').innerHTML=BARS.map((b,i)=>`<button class="bl-toggle ${i===S.barIdx?'on':''}" onclick="S.barIdx=${i};render();">${b.label}</button>`).join('');
}

function setPlateUnit(u){S.pu=u;S.rp=[];render();}
function setInputUnit(u){S.iu=u;render();}
function setTab(t){S.tab=t;render();}

// ── CALCULATE ──
function onCalcInput(){S.ao='exact';renderCalc();renderWU();}
function clearCalc(){document.getElementById('targetInput').value='';S.ao='exact';renderCalc();renderWU();window._tLbs=0;}

function renderCalc(){
    const raw=parseFloat(document.getElementById('targetInput').value);
    const res=document.getElementById('calcResult'),opts=document.getElementById('calcOptions');
    if(!raw||raw<=0){res.innerHTML='';opts.innerHTML='';return;}
    const b=br(),bVal=S.pu==='kg'?b.kg:b.lbs;
    const tInUnit=S.iu==='kg'?(S.pu==='kg'?raw:raw*KG2LBS):(S.pu==='lbs'?raw:raw*LBS2KG);
    const ps=(tInUnit-bVal)/2;
    if(ps<0){res.innerHTML=`<div class="bl-card" style="border-color:#ff453a;text-align:center;color:#ff453a;font-size:14px;">Target less than bar weight</div>`;opts.innerHTML='';return;}

    const{rounded,lower,upper}=roundCalcPl(ps);
    const toT=(v)=>{const tot=v*2+bVal;const kg=S.pu==='kg'?tot:tot*LBS2KG;const lbs=S.pu==='kg'?tot*KG2LBS:tot;return{kg,lbs};};

    const data={
        exact:{ps:rounded,plates:calcPl(rounded),t:toT(rounded)},
        lower:lower!==rounded?{ps:lower,plates:calcPl(lower),t:toT(lower)}:null,
        upper:upper!==rounded?{ps:upper,plates:calcPl(upper),t:toT(upper)}:null
    };
    const act=data[S.ao]||data.exact;

    res.innerHTML=`<div class="bl-card">${barHTML(act.plates)}
        <div style="display:flex;justify-content:center;gap:24px;margin-top:8px;">
            <div style="text-align:center;"><div class="bl-big" style="color:#0a84ff;">${act.t.kg.toFixed(1)}</div><div class="bl-unit">KG</div></div>
            <div style="text-align:center;"><div class="bl-big" style="color:#ffd60a;">${act.t.lbs.toFixed(1)}</div><div class="bl-unit">LBS</div></div>
        </div>
        <div style="text-align:center;margin-top:8px;font-size:12px;color:#636366;">${act.ps} ${S.pu} per side · ${act.plates.length} plate${act.plates.length!==1?'s':''}</div>
    </div>`;

    let oh='';
    if(data.lower) oh+=`<button class="bl-opt ${S.ao==='lower'?'on':''}" onclick="S.ao='lower';renderCalc();renderWU();">↓ ${data.lower.t[S.iu==='kg'?'kg':'lbs'].toFixed(1)} ${S.iu}</button>`;
    oh+=`<button class="bl-opt ${S.ao==='exact'?'on':''}" onclick="S.ao='exact';renderCalc();renderWU();">● ${data.exact.t[S.iu==='kg'?'kg':'lbs'].toFixed(1)} ${S.iu}</button>`;
    if(data.upper) oh+=`<button class="bl-opt ${S.ao==='upper'?'on':''}" onclick="S.ao='upper';renderCalc();renderWU();">↑ ${data.upper.t[S.iu==='kg'?'kg':'lbs'].toFixed(1)} ${S.iu}</button>`;
    opts.innerHTML=oh;

    window._tLbs=act.t.lbs;
}

// ── REVERSE ──
function addPlate(i){S.rp.push(pl()[i]);renderRev();renderWU();}
function removeLastPlate(){S.rp.pop();renderRev();renderWU();}
function clearReverse(){S.rp=[];renderRev();renderWU();}

function renderRev(){
    const b=br(),bVal=S.pu==='kg'?b.kg:b.lbs;
    const ps=S.rp.reduce((s,p)=>s+p.w,0);
    const tot=ps*2+bVal;
    const kg=S.pu==='kg'?tot:tot*LBS2KG;
    const lbs=S.pu==='kg'?tot*KG2LBS:tot;
    document.getElementById('reverseBar').innerHTML=barHTML(S.rp);
    document.getElementById('reverseTotal').innerHTML=`
        <div style="display:flex;justify-content:center;gap:24px;">
            <div style="text-align:center;"><div class="bl-big" style="color:#0a84ff;">${kg.toFixed(1)}</div><div class="bl-unit">KG</div></div>
            <div style="text-align:center;"><div class="bl-big" style="color:#ffd60a;">${lbs.toFixed(1)}</div><div class="bl-unit">LBS</div></div>
        </div>
        <div style="font-size:12px;color:#636366;margin-top:6px;">${ps} ${S.pu} per side · ${S.rp.length} plate${S.rp.length!==1?'s':''}</div>`;
    window._tLbs=lbs;
}

function renderPlateBtns(){
    document.getElementById('plateBtns').innerHTML=pl().map((p,i)=>
        `<button class="bl-plate-btn" style="background:${p.color};color:${p.tc};${p.bd?'border:2px solid '+p.bd+';':''}" onclick="addPlate(${i})">${p.label}</button>`
    ).join('');
}

// ── SHARE AS IMAGE ──
function shareSetup(){
    const b=br(),bVal=S.pu==='kg'?b.kg:b.lbs;
    const ps=S.rp.reduce((s,p)=>s+p.w,0);
    const tot=ps*2+bVal;
    const kg=S.pu==='kg'?tot:tot*LBS2KG;
    const lbs=S.pu==='kg'?tot*KG2LBS:tot;

    const canvas=document.getElementById('shareCanvas');
    const W=1080,H=1350; // Instagram story size
    canvas.width=W;canvas.height=H;
    const ctx=canvas.getContext('2d');

    // Background
    ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);

    // Subtle grid pattern
    ctx.strokeStyle='#111';ctx.lineWidth=0.5;
    for(let i=0;i<W;i+=40){ctx.beginPath();ctx.moveTo(i,0);ctx.lineTo(i,H);ctx.stroke();}
    for(let i=0;i<H;i+=40){ctx.beginPath();ctx.moveTo(0,i);ctx.lineTo(W,i);ctx.stroke();}

    // Draw barbell
    const barY=H*0.42;
    const barStartX=80;
    const sleeveW=50;

    // Collar
    ctx.fillStyle='#777';
    ctx.fillRect(barStartX,barY-16,20,32);
    ctx.fillStyle='#999';
    ctx.fillRect(barStartX+20,barY-12,14,24);
    // Sleeve
    ctx.fillStyle='#aaa';
    ctx.fillRect(barStartX+34,barY-9,sleeveW,18);

    // Plates
    let plateX=barStartX+34+sleeveW;
    const plateColors={};
    S.rp.forEach((p,i)=>{
        const ph=Math.min(p.h*2.8,500);
        const pw=Math.max(p.pw*2,18);
        ctx.fillStyle=p.color;
        ctx.fillRect(plateX,barY-ph/2,pw,ph);
        // Plate border
        ctx.strokeStyle='rgba(0,0,0,0.3)';ctx.lineWidth=1;
        ctx.strokeRect(plateX,barY-ph/2,pw,ph);
        // Number on plate
        ctx.fillStyle=p.tc;
        ctx.font=`bold ${Math.max(12,pw-4)}px -apple-system,sans-serif`;
        ctx.textAlign='center';ctx.textBaseline='top';
        ctx.fillText(p.label,plateX+pw/2,barY-ph/2+8);
        // Count label at bottom
        ctx.font='bold 11px -apple-system,sans-serif';
        ctx.fillText(S.pu.toUpperCase(),plateX+pw/2,barY+ph/2-20);
        // Plate number (order)
        ctx.fillStyle=p.tc;ctx.font='bold 14px -apple-system,sans-serif';
        ctx.fillText(String(i+1),plateX+pw/2,barY-ph/2+28);

        plateX+=pw+2;
        // Track for summary
        plateColors[p.label]=(plateColors[p.label]||0)+1;
    });

    // End cap
    ctx.fillStyle='#555';
    ctx.fillRect(plateX,barY-18,10,36);

    // Bar extends
    const grad=ctx.createLinearGradient(plateX+10,barY-9,plateX+10,barY+9);
    grad.addColorStop(0,'#aaa');grad.addColorStop(1,'#777');
    ctx.fillStyle=grad;
    ctx.fillRect(plateX+10,barY-9,W-plateX-60,18);

    // Weight display - huge text
    const weightY=H*0.72;
    ctx.textAlign='center';ctx.textBaseline='middle';

    // KG
    ctx.fillStyle='#fff';
    ctx.font='900 96px -apple-system,sans-serif';
    ctx.fillText(Math.round(kg*10)/10+'',W*0.3,weightY);
    ctx.fillStyle='#636366';
    ctx.font='700 28px -apple-system,sans-serif';
    ctx.fillText('KG',W*0.3,weightY+55);

    // Divider
    ctx.fillStyle='#38383a';
    ctx.fillRect(W*0.5-1,weightY-50,2,110);

    // LBS
    ctx.fillStyle='#fff';
    ctx.font='900 96px -apple-system,sans-serif';
    ctx.fillText(Math.round(lbs*10)/10+'',W*0.7,weightY);
    ctx.fillStyle='#636366';
    ctx.font='700 28px -apple-system,sans-serif';
    ctx.fillText('LB',W*0.7,weightY+55);

    // Brand at top
    ctx.fillStyle='#ff453a';
    ctx.font='800 16px -apple-system,sans-serif';
    ctx.letterSpacing='4px';
    ctx.textAlign='center';
    ctx.fillText('DRE CALIBRATION',W/2,60);

    // Subtitle
    ctx.fillStyle='#48484a';
    ctx.font='600 13px -apple-system,sans-serif';
    ctx.fillText('BARBELL LOADER',W/2,82);

    // Plate summary at bottom
    const summaryParts=Object.entries(plateColors).map(([l,c])=>`${c}×${l}${S.pu}`);
    ctx.fillStyle='#636366';
    ctx.font='600 14px -apple-system,sans-serif';
    ctx.fillText(`Bar: ${b.label} · ${summaryParts.join(', ')||'Empty'} per side`,W/2,H*0.88);

    // Brand watermark bottom
    ctx.fillStyle='#ff453a';
    ctx.font='800 14px -apple-system,sans-serif';
    ctx.fillText('DRE CALIBRATION',W/2,H-50);
    ctx.fillStyle='#38383a';
    ctx.font='500 11px -apple-system,sans-serif';
    ctx.fillText('drecalibration.com',W/2,H-30);

    // Convert to image and offer download/share
    canvas.toBlob(blob=>{
        const file=new File([blob],'dre-calibration-bar.png',{type:'image/png'});

        // Try native share (mobile)
        if(navigator.canShare && navigator.canShare({files:[file]})){
            navigator.share({files:[file],title:'Dre Calibration',text:`${Math.round(kg)}kg / ${Math.round(lbs)}lbs loaded!`}).catch(()=>{});
        } else {
            // Fallback: download the image
            const url=URL.createObjectURL(blob);
            const a=document.createElement('a');
            a.href=url;a.download='dre-calibration-bar.png';
            document.body.appendChild(a);a.click();a.remove();
            URL.revokeObjectURL(url);
        }
        const btn=document.getElementById('shareBtn');
        btn.textContent='✓ Image saved!';
        setTimeout(()=>{btn.textContent='📸 Share to Story';},2500);
    },'image/png');
}

// ── WARMUP ──
function toggleWarmup(){
    S.wuOpen=!S.wuOpen;
    document.getElementById('wuContent').style.display=S.wuOpen?'block':'none';
    const btn=document.getElementById('wuToggle');
    btn.textContent=S.wuOpen?'▼ Hide Warm-Up Calculator':'▶ Open Warm-Up Calculator';
    btn.style.background=S.wuOpen?'rgba(255,159,10,0.15)':'#2c2c2e';
    btn.style.color=S.wuOpen?'#ff9f0a':'#98989d';
    if(S.wuOpen)renderWU();
}
function setWuLift(l){S.wuLift=l;renderWU();}
function setWuStyle(s){S.wuStyle=s;renderWU();}

function renderWU(){
    document.getElementById('wuLiftBtns').innerHTML=['squat','bench','deadlift'].map(l=>
        `<button class="bl-toggle ${S.wuLift===l?'on':''}" onclick="setWuLift('${l}')">${l.charAt(0).toUpperCase()+l.slice(1)}</button>`
    ).join('');
    document.getElementById('wuStyleBtns').innerHTML=[['standard','Standard'],['big','Aggressive'],['tight','Conservative']].map(([k,l])=>
        `<button class="bl-toggle ${S.wuStyle===k?'on':''}" onclick="setWuStyle('${k}')">${l}</button>`
    ).join('');
    const t=window._tLbs||0;
    const el=document.getElementById('wuSets');
    if(!t||t<=0){el.innerHTML='<div style="text-align:center;color:#48484a;font-size:13px;padding:20px;">Enter a weight to generate warm-up sets</div>';return;}
    const protos={standard:[{p:.505,r:'5'},{p:.608,r:'3'},{p:.72,r:'2'},{p:.834,r:'1'},{p:.93,r:'1'},{p:.97,r:'OPT'}],big:[{p:.45,r:'5'},{p:.68,r:'3'},{p:.84,r:'1'},{p:.92,r:'1'},{p:.97,r:'OPT'}],tight:[{p:.40,r:'8'},{p:.52,r:'5'},{p:.64,r:'3'},{p:.75,r:'2'},{p:.84,r:'1'},{p:.90,r:'1'},{p:.94,r:'1'},{p:.98,r:'OPT'}]};
    const cues={squat:["Move fast, open hips.","Focus foot pressure.","Start bracing.","BELT ON.","Max pressure.","Final heavy feel.","Comp setup.","Optional."],bench:["Active lats.","Drive heels.","Tight arch.","Explode.","Comp pause.","Final heavy feel.","Comp setup.","Optional."],deadlift:["Pull slack.","Chest up.","Squeeze lats.","BELT ON.","Comp speed.","Final heavy feel.","Comp setup.","Optional."]};
    el.innerHTML=protos[S.wuStyle].map((s,i)=>{
        const lbs=Math.round((t*s.p)/5)*5;const kg=Math.round(lbs*LBS2KG*10)/10;
        const belt=(S.wuLift==='squat'&&s.p>=.70)||(S.wuLift==='deadlift'&&s.p>=.83);
        const reps=s.r==='OPT'?'Optional':s.r+' Reps';
        return `<div class="wu-row"><div style="display:flex;justify-content:space-between;align-items:center;"><div><span style="font-weight:800;font-size:16px;color:#fff;">${lbs} lbs</span><span style="color:#636366;font-size:12px;margin-left:8px;">${kg} kg</span>${belt?'<span style="background:#ff453a;color:#fff;font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;margin-left:8px;text-transform:uppercase;">Belt</span>':''}</div><div style="text-align:right;"><span style="color:#0a84ff;font-weight:700;font-size:13px;">${reps}</span><span style="color:#48484a;font-size:11px;margin-left:6px;">${Math.round(s.p*100)}%</span></div></div><div class="wu-cue">${(cues[S.wuLift][i]||'Focus.')}</div></div>`;
    }).join('');
}

// ── RENDER ──
function render(){
    renderBarSelect();
    document.getElementById('puKg').className='bl-toggle'+(S.pu==='kg'?' on':'');
    document.getElementById('puLbs').className='bl-toggle'+(S.pu==='lbs'?' on':'');
    document.getElementById('iuLbs').className='bl-toggle'+(S.iu==='lbs'?' on':'');
    document.getElementById('iuKg').className='bl-toggle'+(S.iu==='kg'?' on':'');
    document.getElementById('tabCalc').className='bl-tab'+(S.tab==='calc'?' active':'');
    document.getElementById('tabReverse').className='bl-tab'+(S.tab==='reverse'?' active':'');
    document.getElementById('calcView').style.display=S.tab==='calc'?'block':'none';
    document.getElementById('reverseView').style.display=S.tab==='reverse'?'block':'none';
    renderPlateBtns();renderCalc();renderRev();if(S.wuOpen)renderWU();
}
window._tLbs=0;render();
</script>
