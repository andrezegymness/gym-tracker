<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Barbell Loader — Dre Calibration</title>
    <style>
        *{box-sizing:border-box;margin:0;padding:0}
        body{background:#000;color:#fff;font-family:-apple-system,'SF Pro Display',sans-serif;min-height:100vh;-webkit-tap-highlight-color:transparent}
        .w{max-width:500px;margin:0 auto;padding:0 14px 100px}
        a.bk{color:#0a84ff;text-decoration:none;font-weight:600;font-size:13px;display:block;text-align:center;padding:12px 0 4px}
        .hd{text-align:center;padding:8px 0 14px}
        .hd .br{font-size:10px;font-weight:800;letter-spacing:3px;color:#ff453a;text-transform:uppercase}
        .hd .ti{font-size:20px;font-weight:900}

        .tg{padding:7px 12px;border-radius:20px;background:rgba(255,255,255,.06);color:#636366;font-weight:700;font-size:11px;cursor:pointer;font-family:inherit;transition:all .2s;border:none;outline:none}
        .tg.on{background:rgba(10,132,255,.2);color:#0a84ff}
        .tg:active{opacity:.7}
        .row{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-bottom:12px}

        .tabs{display:flex;background:#1c1c1e;border-radius:11px;padding:3px;margin-bottom:14px}
        .tab{flex:1;padding:9px 0;border:none;border-radius:9px;font-weight:700;font-size:13px;cursor:pointer;font-family:inherit;background:transparent;color:#636366;transition:all .25s;outline:none}
        .tab.on{background:#fff;color:#000}
        .tab:active{opacity:.8}

        .cd{background:#1c1c1e;border-radius:14px;padding:14px;margin-bottom:12px;border:0.5px solid #2c2c2e}
        .lb{font-size:9px;font-weight:700;color:#636366;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
        .inp{width:100%;background:#000;border:0.5px solid #38383a;color:#fff;padding:12px;border-radius:10px;font-size:18px;font-weight:800;text-align:center;font-family:inherit;outline:none}
        .inp:focus{border-color:#0a84ff;box-shadow:0 0 0 3px rgba(10,132,255,.15)}
        .sinp{width:100%;background:#000;border:0.5px solid #2c2c2e;color:#fff;padding:10px;border-radius:8px;font-size:13px;font-family:inherit;outline:none}
        .sinp:focus{border-color:#ff453a}

        .bn{font-size:32px;font-weight:900;text-align:center;line-height:1.1}
        .un{font-size:12px;font-weight:500;color:#636366}

        .pb{width:48px;height:48px;border-radius:50%;font-weight:800;font-size:12px;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;border:none;outline:none;transition:transform .1s}
        .pb:active{transform:scale(.88)}

        .opt{flex:1;padding:9px 6px;border-radius:20px;background:rgba(255,255,255,.04);color:#636366;font-weight:700;font-size:11px;cursor:pointer;font-family:inherit;text-align:center;border:none;outline:none;transition:all .2s}
        .opt.on{background:rgba(255,214,10,.12);color:#ffd60a}
        .opt:active{opacity:.7}

        .rst{width:100%;padding:11px;border-radius:20px;background:rgba(255,69,58,.08);color:#ff453a;font-weight:700;font-size:13px;cursor:pointer;font-family:inherit;border:none;outline:none;transition:opacity .2s}
        .rst:active{opacity:.7}
        .shr{width:100%;padding:13px;border:none;border-radius:20px;background:#ff453a;color:#fff;font-weight:700;font-size:14px;cursor:pointer;font-family:inherit;margin-bottom:12px;outline:none;transition:opacity .2s}
        .shr:active{opacity:.8}

        .bar-wrap{position:relative;height:160px;overflow-x:auto;overflow-y:hidden;margin:8px 0}
        .bar-inner{display:flex;align-items:center;position:absolute;left:0;top:50%;transform:translateY(-50%);min-width:100%}
        .bar-collar{width:12px;height:22px;background:#777;border-radius:3px 0 0 3px;flex-shrink:0}
        .bar-neck{width:8px;height:18px;background:#999;flex-shrink:0}
        .bar-sleeve{width:24px;height:12px;background:linear-gradient(180deg,#aaa,#777);flex-shrink:0}
        .bar-plates{display:flex;align-items:center;gap:1px;flex-shrink:0}
        .bar-cap{width:5px;height:26px;background:#555;border-radius:0 2px 2px 0;flex-shrink:0}
        .bar-ext{flex:1;min-width:50px;height:12px;background:linear-gradient(180deg,#999,#777);border-radius:0 4px 4px 0}
        .bp{display:flex;align-items:center;justify-content:center;font-weight:900;border-radius:2px;flex-shrink:0;box-shadow:1px 0 3px rgba(0,0,0,.4);writing-mode:vertical-rl;text-orientation:mixed;animation:sl .2s ease both}
        @keyframes sl{from{opacity:0;transform:translateX(-6px)}to{opacity:1;transform:translateX(0)}}

        .wur{padding:8px 0;border-bottom:0.5px solid #2c2c2e}
        .wuc{font-size:11px;color:#636366;font-style:italic;margin-top:3px;padding-left:7px;border-left:2px solid #ff9f0a}
        .ft{text-align:center;padding:20px 0;color:#38383a;font-size:10px;font-weight:600;letter-spacing:1px}
        #shareCanvas{display:none}
        
        .g-table {width:100%;font-size:11px;text-align:center;border-collapse:collapse;margin-top:10px;}
        .g-table th {padding:8px 4px;font-weight:700;color:#636366;border-bottom:1px solid #38383a;}
        .g-table td {padding:8px 4px;border-bottom:0.5px solid #2c2c2e;color:#aaa;}
    </style>
</head>
<body>
<div class="w">
    <a href="index.html" class="bk">← Menu</a>
    <div class="hd"><div class="br">Dre Calibration</div><div class="ti">Barbell Loader</div></div>
    <div class="row" id="barSel"></div>
    <div class="row">
        <button class="tg" id="puKg" onclick="S.pu='kg';S.rp=[];R()">KG Plates</button>
        <button class="tg" id="puLbs" onclick="S.pu='lbs';S.rp=[];R()">LBS Plates</button>
    </div>
    <div class="tabs">
        <button class="tab on" id="tCalc" onclick="S.tab='calc';R()">Calculate</button>
        <button class="tab" id="tRev" onclick="S.tab='rev';R()">Reverse</button>
    </div>

    <div id="vCalc">
        <div class="cd">
            <div class="lb">Target Weight</div>
            <div style="display:flex;gap:8px;align-items:center">
                <input type="number" class="inp" id="tIn" placeholder="0" oninput="S.ao='mid';rCalc();rWU()" style="flex:1">
                <div style="display:flex;flex-direction:column;gap:3px">
                    <button class="tg" id="iuL" onclick="S.iu='lbs';R()">LBS</button>
                    <button class="tg" id="iuK" onclick="S.iu='kg';R()">KG</button>
                </div>
            </div>
        </div>
        <div id="cRes"></div>
        <div id="cOpts" style="display:flex;gap:5px;margin-bottom:12px;flex-wrap:wrap"></div>
        <div class="cd" id="calcShareSec" style="display:none">
            <div class="lb">Add to Screenshot</div>
            <div style="display:flex;gap:6px;margin-bottom:8px">
                <input class="sinp" id="cSets" placeholder="Sets (e.g. 3)" style="flex:1">
                <input class="sinp" id="cReps" placeholder="Reps (e.g. 5)" style="flex:1">
            </div>
            <input class="sinp" id="cNote" placeholder="Note (e.g. PR attempt, speed work...)" style="margin-bottom:8px">
            <button class="shr" onclick="doShare('calc')">📸 Share to Story</button>
        </div>
        <button class="rst" onclick="document.getElementById('tIn').value='';S.ao='mid';rCalc();rWU();T=0">Clear</button>
    </div>

    <div id="vRev" style="display:none">
        <div class="cd">
            <div class="lb">Tap plates to load the bar</div>
            <div id="pBtns" style="display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-bottom:10px"></div>
            <div id="rBar"></div>
            <div id="rTot" style="text-align:center;margin-top:6px"></div>
        </div>
        <div style="display:flex;gap:8px;margin-bottom:12px">
            <button class="rst" onclick="S.rp.pop();rRev();rWU()" style="flex:1;color:#ff9f0a;background:rgba(255,159,10,.08)">Remove Last</button>
            <button class="rst" onclick="S.rp=[];rRev();rWU()" style="flex:1">Clear Bar</button>
        </div>
        <div class="cd">
            <div class="lb">Add to Screenshot</div>
            <div style="display:flex;gap:6px;margin-bottom:8px">
                <input class="sinp" id="rSets" placeholder="Sets" style="flex:1">
                <input class="sinp" id="rReps" placeholder="Reps" style="flex:1">
            </div>
            <input class="sinp" id="rNote" placeholder="Note..." style="margin-bottom:8px">
            <button class="shr" id="shrBtn" onclick="doShare('rev')">📸 Share to Story</button>
        </div>
    </div>

    <div class="cd" style="margin-top:6px">
        <button id="wuTog" onclick="S.wu=!S.wu;document.getElementById('wuC').style.display=S.wu?'block':'none';this.textContent=S.wu?'▼ Hide Warm-Up':'▶ Open Warm-Up Calculator';this.style.background=S.wu?'rgba(255,159,10,.15)':'rgba(255,255,255,.04)';this.style.color=S.wu?'#ff9f0a':'#636366';if(S.wu)rWU()" style="width:100%;padding:11px;border:none;border-radius:20px;background:rgba(255,255,255,.04);color:#636366;font-weight:700;font-size:13px;cursor:pointer;font-family:inherit;outline:none">▶ Open Warm-Up Calculator</button>
        <div id="wuC" style="display:none;margin-top:12px">
            <div class="row" id="wuL"></div>
            <div class="row" id="wuS"></div>
            <div id="wuR"></div>
        </div>
    </div>

    <div class="cd" style="margin-top:6px">
        <button id="gcTog" onclick="S.gc=!S.gc;document.getElementById('gcC').style.display=S.gc?'block':'none';this.textContent=S.gc?'▼ Hide Goal Calculator':'🎯 Open Goal Calculator';this.style.background=S.gc?'rgba(10,132,255,.15)':'rgba(255,255,255,.04)';this.style.color=S.gc?'#0a84ff':'#636366';if(S.gc){document.getElementById('gWIn').value = Math.round(T||0); rGoal();}" style="width:100%;padding:11px;border:none;border-radius:20px;background:rgba(255,255,255,.04);color:#636366;font-weight:700;font-size:13px;cursor:pointer;font-family:inherit;outline:none">🎯 Open Goal Calculator</button>
        <div id="gcC" style="display:none;margin-top:16px">
            <div style="display:flex;gap:6px;align-items:center;justify-content:center;margin-bottom:8px">
                <span style="font-size:13px;color:#636366;font-weight:700">I did</span>
                <input type="number" class="sinp" id="gWIn" placeholder="W" oninput="rGoal()" style="width:70px;font-size:16px;text-align:center;padding:8px">
                <span style="font-size:13px;color:#636366;font-weight:700">for</span>
                <input type="number" class="sinp" id="gRIn" placeholder="R" value="1" oninput="rGoal()" style="width:60px;font-size:16px;text-align:center;padding:8px">
                <span style="font-size:13px;color:#636366;font-weight:700">reps.</span>
            </div>
            <div id="gOut"></div>
        </div>
    </div>

    <div class="ft">DRE CALIBRATION · BARBELL LOADER</div>
</div>
<canvas id="shareCanvas"></canvas>

<script>
// Load the livery mask image immediately so it's ready when doShare is called.
// Assumes your web server allows cross-origin requests for getImageData.
let imgMask = new Image();
imgMask.crossOrigin = "Anonymous"; // Crucial for using pixel manipulation masking
imgMask.src = "uploaded:image_b5af75.jpg-5087e80d-6cac-4d66-89e4-0f89b3408f8d"; // filename reference from turn 9

const K=2.20462,L=1/K;

const KGP=[
    {w:25,c:"#DC2626",l:"25",tc:"#fff",h:140,pw:14},
    {w:20,c:"#2563EB",l:"20",tc:"#fff",h:132,pw:13},
    {w:15,c:"#EAB308",l:"15",tc:"#000",h:124,pw:12},
    {w:10,c:"#16A34A",l:"10",tc:"#fff",h:110,pw:11},
    {w:5, c:"#E5E7EB",l:"5", tc:"#000",h:90,pw:9},
    {w:2.5,c:"#1c1c1e",l:"2.5",tc:"#fff",h:72,pw:8,bd:"#666"},
    {w:1.25,c:"#555",l:"1.25",tc:"#ccc",h:58,pw:7,bd:"#888"},
    {w:0.5,c:"#444",l:"0.5",tc:"#999",h:46,pw:6,bd:"#777"},
    {w:0.25,c:"#333",l:".25",tc:"#888",h:38,pw:5,bd:"#666"},
    {w:0.125,c:"#2a2a2a",l:".125",tc:"#777",h:32,pw:5,bd:"#555"}
];

const LBSP=[
    {w:45,c:"#222",l:"45",tc:"#fff",h:140,pw:14,bd:"#666"},
    {w:35,c:"#222",l:"35",tc:"#fff",h:128,pw:13,bd:"#666"},
    {w:25,c:"#222",l:"25",tc:"#fff",h:116,pw:12,bd:"#666"},
    {w:10,c:"#222",l:"10",tc:"#fff",h:96,pw:10,bd:"#666"},
    {w:5, c:"#222",l:"5", tc:"#fff",h:76,pw:9,bd:"#666"},
    {w:2.5,c:"#222",l:"2.5",tc:"#fff",h:60,pw:8,bd:"#666"}
];

const BARS=[
    {l:"45lb Standard",kg:20.4117,lbs:45},
    {l:"20kg Comp Barbell",kg:20,lbs:44.0924},
    {l:"25kg Squat Bar",kg:25,lbs:55.1156}
];

let S={tab:'calc',bi:0,pu:'kg',iu:'lbs',rp:[],ao:'mid',wu:false,gc:false,wl:'squat',ws:'standard'};
let T=0;
function P(){return S.pu==='kg'?KGP:LBSP}
function B(){return BARS[S.bi]}

function cAll(ps){let r=ps;const o=[];for(const p of P()){while(r>=p.w-0.001){o.push(p);r-=p.w}}return o}
function eP(){return S.pu==='lbs'?LBSP:KGP.filter(p=>p.w>=2.5)}
function cEasy(ps){let r=ps;const o=[];for(const p of eP()){while(r>=p.w-0.001){o.push(p);r-=p.w}}return o}

function bpH(p,i){
    return `<div class="bp" style="height:${p.h}px;width:${p.pw}px;background:${p.c};color:${p.tc};font-size:${p.pw<8?5:p.pw<10?6:7}px;${p.bd?'border:1px solid '+p.bd+';':''}animation-delay:${i*.04}s">${p.l}</div>`;
}
function barH(pls){
    return `<div class="bar-wrap"><div class="bar-inner"><div class="bar-collar"></div><div class="bar-neck"></div><div class="bar-sleeve"></div><div class="bar-plates">${pls.map((p,i)=>bpH(p,i)).join('')}</div><div class="bar-cap"></div><div class="bar-ext"></div></div></div>`;
}

function plateListHTML(pls){
    if(!pls||pls.length===0) return '<div style="font-size:11px;color:#636366;text-align:center;margin-top:8px">No plates loaded</div>';
    const counts=[];
    P().forEach(p=>{
        let c=0;pls.forEach(pl=>{if(pl.w===p.w)c++});
        if(c>0)counts.push(`<span style="background:#222;padding:3px 6px;border-radius:4px;border:1px solid ${p.bd||p.c};color:#fff;font-weight:700">${c} × ${p.l}</span>`);
    });
    return `<div style="font-size:11px;margin-top:10px;display:flex;flex-wrap:wrap;gap:6px;justify-content:center;">${counts.join('')}</div>`;
}

function R(){
    document.getElementById('barSel').innerHTML=BARS.map((b,i)=>`<button class="tg ${i===S.bi?'on':''}" onclick="S.bi=${i};R()">${b.l}</button>`).join('');
    document.getElementById('puKg').className='tg'+(S.pu==='kg'?' on':'');
    document.getElementById('puLbs').className='tg'+(S.pu==='lbs'?' on':'');
    document.getElementById('iuL').className='tg'+(S.iu==='lbs'?' on':'');
    document.getElementById('iuK').className='tg'+(S.iu==='kg'?' on':'');
    document.getElementById('tCalc').className='tab'+(S.tab==='calc'?' on':'');
    document.getElementById('tRev').className='tab'+(S.tab==='rev'?' on':'');
    document.getElementById('vCalc').style.display=S.tab==='calc'?'block':'none';
    document.getElementById('vRev').style.display=S.tab==='rev'?'block':'none';
    document.getElementById('pBtns').innerHTML=P().map((p,i)=>`<button class="pb" style="background:${p.c};color:${p.tc};${p.bd?'box-shadow:inset 0 0 0 2px '+p.bd+';':''}" onclick="S.rp.push(P()[${i}]);rRev();rWU()">${p.l}</button>`).join('');
    rCalc();rRev();if(S.wu)rWU();
}

function bestLoad(perSide){
    const inc=2.5;
    const lo=Math.floor(perSide/inc)*inc;
    const hi=Math.ceil(perSide/inc)*inc;
    const best=(perSide-lo)<=(hi-perSide)?lo:hi;
    return{best,lo,hi};
}

function getOptimalExact(perSide, pu) {
    const smallestPlate = P()[P().length-1].w;
    const basePS = Math.round(perSide/smallestPlate)*smallestPlate;
    let bestPlates = cAll(basePS);
    let bestPS = basePS;
    let minPlates = bestPlates.length;
    
    const maxDev = pu === 'kg' ? 0.4536 : 1.0; 
    
    for (let offset = -maxDev; offset <= maxDev + 0.001; offset += smallestPlate) {
        const testPS = Math.round((perSide + offset)/smallestPlate)*smallestPlate;
        if (testPS < 0) continue;
        if (Math.abs(testPS - perSide) > maxDev + 0.001) continue;
        
        const plates = cAll(testPS);
        if (plates.length < minPlates) {
            minPlates = plates.length;
            bestPS = testPS;
            bestPlates = plates;
        } else if (plates.length === minPlates) {
            if (Math.abs(testPS - perSide) < Math.abs(bestPS - perSide)) {
                bestPS = testPS;
                bestPlates = plates;
            }
        }
    }
    return { ps: bestPS, pl: bestPlates };
}

function makeTotals(perSideActual){
    const barKg=B().kg;
    const totalKg=S.pu==='kg'?perSideActual*2+barKg:perSideActual*2*L+barKg;
    return{kg:totalKg,lbs:totalKg*K};
}

function rCalc(){
    const raw=parseFloat(document.getElementById('tIn').value);
    const res=document.getElementById('cRes'),opts=document.getElementById('cOpts');
    const shareSec=document.getElementById('calcShareSec');
    if(!raw||raw<=0){res.innerHTML='';opts.innerHTML='';T=0;if(shareSec)shareSec.style.display='none';return}

    const inputKg=S.iu==='kg'?raw:raw*L;
    const barKg=B().kg;
    const perSideKg=(inputKg-barKg)/2;
    if(perSideKg<0){res.innerHTML=`<div class="cd" style="text-align:center;color:#ff453a;font-size:13px">Target less than bar weight</div>`;opts.innerHTML='';return}
    const perSide=S.pu==='kg'?perSideKg:perSideKg*K;

    const{best,lo,hi}=bestLoad(perSide);

    const midPl=cEasy(best);const midPS=midPl.reduce((s,p)=>s+p.w,0);const midT=makeTotals(midPS);
    const loPl=cEasy(lo);const loPS=loPl.reduce((s,p)=>s+p.w,0);const loT=makeTotals(loPS);
    const hiPl=cEasy(hi);const hiPS=hiPl.reduce((s,p)=>s+p.w,0);const hiT=makeTotals(hiPS);
    const optExact = getOptimalExact(perSide, S.pu);
    const exactPl = optExact.pl;
    const exactPS = optExact.ps;
    const exactT = makeTotals(exactPS);

    const data={lo:{ps:loPS,pl:loPl,t:loT},mid:{ps:midPS,pl:midPl,t:midT},hi:{ps:hiPS,pl:hiPl,t:hiT},exact:{ps:exactPS,pl:exactPl,t:exactT}};

    const midIsHi=Math.abs(midT.lbs-hiT.lbs)<0.3;
    const midIsLo=Math.abs(midT.lbs-loT.lbs)<0.3;

    const act=data[S.ao]||data.mid;
    const dKg=(Math.round(act.t.kg*10)/10).toFixed(1);
    const dLbs=(Math.round(act.t.lbs*10)/10).toFixed(1);

    res.innerHTML=`<div class="cd">
        ${barH(act.pl)}
        ${plateListHTML(act.pl)}
        <div style="display:flex;justify-content:center;gap:20px;margin-top:12px">
            <div style="text-align:center"><div class="bn" style="color:#0a84ff">${dKg}</div><div class="un">KG</div></div>
            <div style="text-align:center"><div class="bn" style="color:#ffd60a">${dLbs}</div><div class="un">LBS</div></div>
        </div>
        <div style="text-align:center;margin-top:6px;font-size:11px;color:#636366">${act.ps} ${S.pu} per side · ${act.pl.length} plate${act.pl.length!==1?'s':''}</div>
    </div>`;

    const iu=S.iu;
    let oh='';
    if(!midIsLo){
        oh+=`<button class="opt ${S.ao==='lo'?'on':''}" onclick="S.ao='lo';rCalc();rWU()" style="flex:1 1 20%">↓ ${(iu==='kg'?loT.kg:loT.lbs).toFixed(1)}<br><span style="font-size:9px;opacity:.6">lighter</span></button>`;
    }
    oh+=`<button class="opt ${S.ao==='mid'?'on':''}" onclick="S.ao='mid';rCalc();rWU()" style="flex:1 1 20%">● ${(iu==='kg'?midT.kg:midT.lbs).toFixed(1)}<br><span style="font-size:9px;opacity:.6">${midIsHi||midIsLo?'best':'best load'}</span></button>`;
    if(!midIsHi){
        oh+=`<button class="opt ${S.ao==='hi'?'on':''}" onclick="S.ao='hi';rCalc();rWU()" style="flex:1 1 20%">↑ ${(iu==='kg'?hiT.kg:hiT.lbs).toFixed(1)}<br><span style="font-size:9px;opacity:.6">heavier</span></button>`;
    }
    oh+=`<button class="opt ${S.ao==='exact'?'on':''}" onclick="S.ao='exact';rCalc();rWU()" style="flex:1 1 20%; background:${S.ao==='exact'?'rgba(10,132,255,.15)':'rgba(255,255,255,.04)'};color:${S.ao==='exact'?'#0a84ff':'#636366'}">★ ${(iu==='kg'?exactT.kg:exactT.lbs).toFixed(1)}<br><span style="font-size:9px;opacity:.6">exact load</span></button>`;
    
    opts.innerHTML=oh;

    if(shareSec)shareSec.style.display='block';

    T=act.t.lbs;
    window._calcPlates=act.pl;window._calcT=act.t;
}

function rRev(){
    const bv=S.pu==='kg'?B().kg:B().lbs;
    const ps=S.rp.reduce((s,p)=>s+p.w,0);
    const t=ps*2+bv;
    const kg=S.pu==='kg'?t:t*L;
    const lbs=kg*K;
    
    document.getElementById('rBar').innerHTML=barH(S.rp) + plateListHTML(S.rp);
    
    document.getElementById('rTot').innerHTML=`
        <div style="display:flex;justify-content:center;gap:20px;margin-top:6px">
            <div style="text-align:center"><div class="bn" style="color:#0a84ff">${(Math.round(kg*10)/10).toFixed(1)}</div><div class="un">KG</div></div>
            <div style="text-align:center"><div class="bn" style="color:#ffd60a">${(Math.round(lbs*10)/10).toFixed(1)}</div><div class="un">LBS</div></div>
        </div>
        <div style="font-size:11px;color:#636366;margin-top:4px">${ps} ${S.pu} per side · ${S.rp.length} plate${S.rp.length!==1?'s':''}</div>`;
    T=lbs;
}

function doShare(src){
    let plates,kg,lbs,sets,reps,note;
    if(src==='calc'){
        plates=window._calcPlates||[];
        kg=window._calcT?window._calcT.kg:0;
        lbs=window._calcT?window._calcT.lbs:0;
        sets=document.getElementById('cSets').value.trim();
        reps=document.getElementById('cReps').value.trim();
        note=document.getElementById('cNote').value.trim();
    } else {
        plates=S.rp;
        const bv=S.pu==='kg'?B().kg:B().lbs;
        const ps=plates.reduce((s,p)=>s+p.w,0);
        const t=ps*2+bv;
        kg=S.pu==='kg'?t:t*L;lbs=kg*K;
        sets=document.getElementById('rSets').value.trim();
        reps=document.getElementById('rReps').value.trim();
        note=document.getElementById('rNote').value.trim();
    }

    const c=document.getElementById('shareCanvas');
    const W=1080,H=660;
    c.width=W;c.height=H;
    const x=c.getContext('2d');

    // Ensure mask image is fully loaded before drawing
    if (!imgMask.complete) {
        alert("Livery template still loading. Try again in a moment.");
        return; 
    }

    // --- NEW COMPLEX HKS LIERY + MASKING LOGIC ---
    
    // 1. DRE CALIBRATION Base Wall
    x.fillStyle='#050505';
    x.fillRect(0,0,W,H);

    // 2. Prep MASKING CANVASES (Off-screen)
    const mCanvas = document.createElement('canvas');
    mCanvas.width = W; mCanvas.height = H;
    const mCtx = mCanvas.getContext('2d');

    const sCanvas = document.createElement('canvas');
    sCanvas.width = W; sCanvas.height = H;
    const sCtx = sCanvas.getContext('2d');

    // Step A: Convert Black/White mask image to an OPACITY MASK (White Opaque, Black Transparent)
    // Draw stretched mask onto temp canvas
    mCtx.drawImage(imgMask, 0, 0, W, H);
    // Get pixel data to manipulate alpha channel based on brightness
    const imageData = mCtx.getImageData(0, 0, W, H);
    const data = imageData.data;
    for (let i = 0; i < data.length; i += 4) {
        // Luminance calculation (average RGB)
        const luminance = (data[i] + data[i+1] + data[i+2]) / 3;
        // The mask is white designs on black. 
        // We want to keep white designs, so make black background transparent.
        data[i+3] = luminance; // Set alpha based on luminance. White (255) -> Opaque (255). Black (0) -> Transparent (0).
    }
    // Put modified alpha mask data back onto the temp canvas
    mCtx.putImageData(imageData, 0, 0);

    // Step B: Draw FULL diagonal HKS retro stripes onto SEPARATE temp canvas
    sCtx.save();
    sCtx.translate(W/2, H/2);
    sCtx.rotate(-35 * Math.PI / 180);
    const sW = 140; // width of each stripe
    const off = 100; // offset position
    sCtx.fillStyle='#ED1C24'; sCtx.fillRect(-W, off, W*2, sW); // Red
    sCtx.fillStyle='#7B3F98'; sCtx.fillRect(-W, off - sW, W*2, sW); // Purple
    sCtx.fillStyle='#00A388'; sCtx.fillRect(-W, off - sW*2, W*2, sW); // Teal
    sCtx.restore();

    // Step C: MASK the stripes! (Designs = Stripes, everything else transparent base wall)
    sCtx.globalCompositeOperation = 'destination-in'; // Keeps source (stripes) only where dest (alpha mask) is non-transparent
    sCtx.drawImage(mCanvas, 0, 0, W, H);
    sCtx.globalCompositeOperation = 'source-over'; // Reset to default

    // Step D: Composite masked designs onto MAIN canvas
    x.drawImage(sCanvas, 0, 0, W, H);

    // 3. Dark Gradient Overlay (Legibility for barbell and text)
    const bgGrad = x.createLinearGradient(0, 0, 0, H);
    bgGrad.addColorStop(0, 'rgba(0,0,0,0.1)'); // Minimal top darken
    bgGrad.addColorStop(0.4, 'rgba(0,0,0,0.7)'); // Fast ramp-up
    bgGrad.addColorStop(1, 'rgba(0,0,0,0.95)'); // Heavy bottom darken
    x.fillStyle = bgGrad;
    x.fillRect(0,0,W,H);
    
    // --- END BACKGROUND INTEGRATION ---

    // Top Header with drop shadow for legibility over stripes
    x.shadowColor = 'rgba(0,0,0,0.9)';
    x.shadowBlur = 10;
    x.shadowOffsetY = 2;
    x.fillStyle='#ffffff'; // White text
    x.font='800 18px -apple-system,sans-serif';
    x.textAlign='center';
    x.textBaseline='top';
    x.fillText('IN DRE WE TRUST',W/2,16);

    const barY=H*0.38;
    const sx=50;

    const barName = BARS[S.bi].l;
    x.fillStyle='rgba(255,255,255,.6)';
    x.font='700 18px -apple-system,sans-serif';
    x.textAlign='center';
    x.textBaseline='bottom';
    x.fillText(`BAR: ${barName.toUpperCase()}`, W/2, barY - 170);

    // Reset shadow for clean plates
    x.shadowColor = 'transparent';

    const sleeveGrad=x.createLinearGradient(0,barY-7,0,barY+7);
    sleeveGrad.addColorStop(0,'#aaa');sleeveGrad.addColorStop(1,'#777');

    x.fillStyle='#777';x.fillRect(sx,barY-14,16,28); // collar
    x.fillStyle='#999';x.fillRect(sx+16,barY-10,10,20); // neck
    
    let totalPW = 0;
    plates.forEach(p => totalPW += Math.max(p.pw*1.8, 14) + 2);
    const usableSleeve = Math.max(380, totalPW + 15); // Fixed realistic length
    
    x.fillStyle=sleeveGrad;x.fillRect(sx+26,barY-7,30 + usableSleeve,14);

    let px=sx+56;
    plates.forEach((p,i)=>{
        const ph=Math.min(p.h*2.2,400);
        const pw=Math.max(p.pw*1.8,14);
        x.fillStyle=p.c;x.fillRect(px,barY-ph/2,pw,ph);
        
        x.strokeStyle = p.bd ? p.bd : 'rgba(0,0,0,.3)';
        x.lineWidth=1;x.strokeRect(px,barY-ph/2,pw,ph);
        
        x.fillStyle=p.tc;x.font=`bold ${Math.max(10,pw-6)}px -apple-system,sans-serif`;
        x.textAlign='center';x.textBaseline='middle';
        x.fillText(p.l,px+pw/2,barY);
        px+=pw+2;
    });

    const endPx = sx + 26 + 30 + usableSleeve;
    x.fillStyle='#555';x.fillRect(endPx,barY-16,8,32); // end cap

    // Weight numbers
    const wy=H*0.72;
    
    // Shadow for numbers
    x.shadowColor = 'rgba(0,0,0,0.9)';
    
    x.textAlign='center';x.textBaseline='middle';
    x.fillStyle='#fff';x.font='900 64px -apple-system,sans-serif';
    x.fillText((Math.round(kg*10)/10)+'',W*0.28,wy);
    x.fillStyle='rgba(255,255,255,.4)';x.font='700 18px -apple-system,sans-serif';
    x.fillText('KG',W*0.28,wy+38);

    x.fillStyle='rgba(255,255,255,.15)';x.fillRect(W*0.5-1,wy-30,2,70);

    x.fillStyle='#fff';x.font='900 64px -apple-system,sans-serif';
    x.fillText((Math.round(lbs*10)/10)+'',W*0.72,wy);
    x.fillStyle='rgba(255,255,255,.4)';x.font='700 18px -apple-system,sans-serif';
    x.fillText('LB',W*0.72,wy+38);

    // Sets/Reps/Note if provided
    let infoY=wy+65;
    if(sets||reps){
        x.fillStyle='rgba(255,255,255,.7)';x.font='700 16px -apple-system,sans-serif';
        let sr='';
        if(sets&&reps) sr=sets+'×'+reps;
        else if(sets) sr=sets+' sets';
        else if(reps) sr=reps+' reps';
        x.fillText(sr,W/2,infoY);
        infoY+=22;
    }
    if(note){
        x.fillStyle='rgba(255,255,255,.5)';x.font='500 14px -apple-system,sans-serif';
        x.fillText(note,W/2,infoY);
    }

    x.fillStyle='#ff453a';x.font='800 14px -apple-system,sans-serif';
    x.textBaseline='bottom';
    x.fillText('DRE CALIBRATION',W/2,H-14);

    c.toBlob(async blob => {
        // TRICK 1: Force copy image to device clipboard for IG Story paste fix
        try {
            const item = new ClipboardItem({ 'image/png': blob });
            await navigator.clipboard.write([item]);
        } catch (err) {
            console.log('Clipboard direct copy not supported.');
        }

        // TRICK 2: Share sheet, but only hand file (NO TEXT title)
        const file = new File([blob], 'dre-calibration.png', {type: 'image/png'});
        if (navigator.canShare && navigator.canShare({files: [file]})) {
            navigator.share({
                files: [file] // notice 'title' is removed
            }).catch(() => {});
        } else {
            const u = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = u; a.download = 'dre-calibration.png'; document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(u);
        }
    }, 'image/png');
}

// ── WARMUP ──
function rWU(){

    document.getElementById('wuS').innerHTML=[['standard','Standard'],['big','Aggressive'],['tight','Conservative']].map(([k,n])=>`<button class="tg ${S.ws===k?'on':''}" onclick="S.ws='${k}';rWU()">${n}</button>`).join('');
    const el=document.getElementById('wuR');
    if(!T||T<=0){el.innerHTML='<div style="text-align:center;color:#48484a;font-size:12px;padding:16px">Enter a weight to see warm-ups</div>';return}
    const pr={standard:[{p:.505,r:'5'},{p:.608,r:'3'},{p:.72,r:'2'},{p:.834,r:'1'},{p:.93,r:'1'},{p:.97,r:'OPT'}],big:[{p:.45,r:'5'},{p:.68,r:'3'},{p:.84,r:'1'},{p:.92,r:'1'},{p:.97,r:'OPT'}],tight:[{p:.40,r:'8'},{p:.52,r:'5'},{p:.64,r:'3'},{p:.75,r:'2'},{p:.84,r:'1'},{p:.90,r:'1'},{p:.94,r:'1'},{p:.98,r:'OPT'}]};
    const cu={squat:["Move fast.","Foot pressure.","Bracing.","BELT ON.","Max pressure.","Heavy feel.","Comp.","Opt."],bench:["Active lats.","Drive heels.","Tight arch.","Explode.","Comp pause.","Heavy feel.","Comp.","Opt."],deadlift:["Pull slack.","Chest up.","Lats.","BELT ON.","Comp speed.","Heavy feel.","Comp.","Opt."]};
    el.innerHTML=pr[S.ws].map((s,i)=>{
        const lb=Math.round((T*s.p)/5)*5;const kg=Math.round(lb*L*10)/10;
        const belt=(S.wl==='squat'&&s.p>=.70)||(S.wl==='deadlift'&&s.p>=.83);
        const rp=s.r==='OPT'?'Opt':s.r+'r';
        return `<div class="wur"><div style="display:flex;justify-content:space-between;align-items:center"><div><b style="font-size:15px">${lb}</b> <span style="color:#636366;font-size:11px">${kg}kg</span>${belt?' <span style="background:#ff453a;color:#fff;font-size:8px;font-weight:700;padding:1px 5px;border-radius:10px">BELT</span>':''}</div><div><span style="color:#0a84ff;font-weight:700;font-size:12px">${rp}</span> <span style="color:#48484a;font-size:10px">${Math.round(s.p*100)}%</span></div></div><div class="wuc">${cu[S.wl][i]||'Focus.'}</div></div>`;
    }).join('');
}

// ── GOAL CALCULATOR ──
function rGoal() {
    const gw = parseFloat(document.getElementById('gWIn').value) || 0;
    const gr = parseInt(document.getElementById('gRIn').value) || 1;
    const out = document.getElementById('gOut');

    if(gw <= 0 || gr <= 0) {
        out.innerHTML = '<div style="text-align:center;color:#48484a;font-size:12px;padding:16px">Enter weight & reps</div>';
        return;
    }

    const b1 = gw * (36 / (37 - gr));
    const e1 = gw * (1 + gr/30);
    const o1 = gw * (1 + gr/40);
    const w1 = gw * 100 / (48.8 + 53.8 * Math.exp(-0.075 * gr));
    const l1 = gw * 100 / (101.3 - 2.67123 * gr);

    let html = `<div style="overflow-x:auto;"><table class="g-table">
        <tr>
            <th>RM</th>
            <th style="color:#fff">Average</th>
            <th>Brzycki</th>
            <th>Epley</th>
            <th>O'Conner</th>
            <th>Wathan</th>
            <th>Lander</th>
        </tr>`;

    for(let r=1; r<=10; r++) {
        const b = r===1 ? b1 : b1 * (37 - r) / 36;
        const e = r===1 ? e1 : e1 / (1 + r/30);
        const o = r===1 ? o1 : o1 / (1 + r/40);
        const w = r===1 ? w1 : w1 * (48.8 + 53.8 * Math.exp(-0.075 * r)) / 100;
        const l = r===1 ? l1 : l1 * (101.3 - 2.67123 * r) / 100;

        const avg = (b + e + o + w + l) / 5;

        html += `<tr>
            <td style="font-weight:700;color:#636366">${r}RM</td>
            <td style="font-weight:800;color:#fff">${Math.round(avg)}</td>
            <td>${Math.round(b)}</td>
            <td>${Math.round(e)}</td>
            <td>${Math.round(o)}</td>
            <td>${Math.round(w)}</td>
            <td>${Math.round(l)}</td>
        </tr>`;
    }
    html += `</table></div>`;
    out.innerHTML = html;
}
